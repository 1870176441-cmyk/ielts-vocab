<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>雅思每日词汇</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede8;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:#e0ddd4;--border2:#ccc;
  --blue-bg:#e6f1fb;--blue-text:#0c447c;
  --green-bg:#e1f5ee;--green-text:#085041;
  --purple-bg:#eeedfe;--purple-text:#3c3489;
  --amber-bg:#faeeda;--amber-text:#633806;
  --warn-bg:#fff8e6;--warn-border:#f0c040;--warn-text:#7a5200;
  --accent:#185fa5;--radius:12px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#6e6e73;
    --border:#38383a;--border2:#48484a;
    --blue-bg:#0c2d4a;--blue-text:#7eb8f5;
    --green-bg:#0a2e20;--green-text:#5dd4a5;
    --purple-bg:#1e1a4a;--purple-text:#b0a8f0;
    --amber-bg:#3a2500;--amber-text:#f0c060;
    --warn-bg:#2a1f00;--warn-border:#a07820;--warn-text:#f0c060;
    --accent:#5b9bd5;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
#loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.spin{animation:spin 1s linear infinite;font-size:32px;color:var(--text3)}
@keyframes spin{to{transform:rotate(360deg)}}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:32px 28px;width:100%;max-width:400px}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.login-logo-icon{width:40px;height:40px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px}
.login-logo-text{font-size:18px;font-weight:500}
.login-desc{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.field-label{font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.login-card input{width:100%;padding:10px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);margin-bottom:10px;outline:none;transition:border .15s}
.login-card input:focus{border-color:var(--accent)}
.otp-input{letter-spacing:8px;font-size:22px;text-align:center;font-weight:500}
.login-btn{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;border:none;font-size:15px;font-family:inherit;cursor:pointer;transition:opacity .15s;font-weight:500}
.login-btn:hover{opacity:.9}
.login-btn:disabled{opacity:.5;cursor:default}
.login-err{font-size:13px;color:#b91c1c;margin-top:8px;display:none;text-align:center}
.back-link{font-size:13px;color:var(--text2);text-align:center;margin-top:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.back-link:hover{color:var(--text)}
.otp-hint{font-size:13px;color:var(--text2);text-align:center;margin-bottom:14px;line-height:1.6}
.otp-hint b{color:var(--text);font-weight:500}
#app{display:none;flex-direction:column;min-height:100vh}
header{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:8px}
.header-title{font-size:15px;font-weight:500}
.day-tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--blue-bg);color:var(--blue-text)}
.header-right{display:flex;align-items:center;gap:8px}
.user-email{font-size:12px;color:var(--text3);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{font-size:12px;color:var(--text2);background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 6px;border-radius:6px;display:flex;align-items:center;gap:3px}
.logout-btn:hover{background:var(--bg2)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;display:none}
.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite}
.sync-dot.on{display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.progress-wrap{height:3px;background:var(--border)}
.progress-fill{height:100%;background:var(--accent);transition:width .35s ease}
main{flex:1;max-width:680px;width:100%;margin:0 auto;padding:20px 16px 100px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.word-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.word{font-size:28px;font-weight:500;letter-spacing:-.3px}
.pos-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.pos-adj{background:var(--purple-bg);color:var(--purple-text)}
.pos-v{background:var(--green-bg);color:var(--green-text)}
.pos-n{background:var(--blue-bg);color:var(--blue-text)}
.known-mark{font-size:12px}
.known-mark.yes{color:#15803d}
.known-mark.no{color:#b91c1c}
.phonetic{font-size:13px;color:var(--text2);margin-bottom:16px;font-family:"Courier New",monospace}
.zh-meaning{font-size:17px;font-weight:500;background:var(--bg2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:20px;line-height:1.5}
.section{margin-bottom:18px}
.section-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.section-label i{font-size:13px}
.example-en{font-size:14px;line-height:1.7;margin-bottom:5px}
.example-en em{color:var(--accent);font-style:normal;font-weight:500}
.example-zh{font-size:13px;color:var(--text2);line-height:1.6}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--text2);display:flex;align-items:center;gap:4px}
.tag i{font-size:12px}
.tip-box{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;color:var(--warn-text);line-height:1.7;display:flex;gap:8px;align-items:flex-start}
.tip-box i{font-size:16px;flex-shrink:0;margin-top:1px}
.divider{height:1px;background:var(--border);margin:18px 0}
.known-row{display:flex;gap:8px;margin-top:14px}
.known-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--bg);color:var(--text)}
.known-btn:active{transform:scale(.97)}
.known-btn.yes{border-color:#22c55e;color:#15803d;background:#f0fdf4}
.known-btn.no{border-color:#ef4444;color:#b91c1c;background:#fef2f2}
@media(prefers-color-scheme:dark){
  .known-btn.yes{background:#052e16;border-color:#16a34a;color:#4ade80}
  .known-btn.no{background:#2d0a0a;border-color:#dc2626;color:#f87171}
}
.swipe-hint{text-align:center;font-size:12px;color:var(--text3);margin-top:10px;display:none;align-items:center;justify-content:center;gap:4px}
nav{position:fixed;bottom:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 20px 24px;display:flex;align-items:center;justify-content:space-between;width:100%;max-width:680px;left:50%;transform:translateX(-50%)}
.nav-btn{display:flex;align-items:center;gap:6px;font-size:14px;padding:9px 18px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s;font-family:inherit}
.nav-btn:hover{background:var(--bg2)}
.nav-btn:active{transform:scale(.97)}
.nav-btn:disabled{opacity:.3;cursor:default;transform:none}
.counter{font-size:13px;color:var(--text2);text-align:center}
.counter b{font-size:15px;font-weight:500;color:var(--text)}
.done-screen{text-align:center;padding:60px 20px;display:none;flex-direction:column;align-items:center;gap:14px}
.done-screen i.big{font-size:48px;color:#22c55e}
.done-screen h2{font-size:20px;font-weight:500}
.done-screen p{font-size:14px;color:var(--text2);line-height:1.6}
.stat-row{display:flex;gap:12px;width:100%;max-width:260px}
.stat-card{flex:1;background:var(--bg2);border-radius:var(--radius-sm);padding:14px;text-align:center}
.stat-card .num{font-size:28px;font-weight:500}
.stat-card .lbl{font-size:12px;color:var(--text2);margin-top:2px}
.restart-btn{padding:10px 24px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}
.archive-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:18px;padding:4px 6px;border-radius:6px;display:flex;align-items:center}
.archive-btn:hover{background:var(--bg2);color:var(--text)}
#archive-screen{padding:0 0 100px}
.archive-back{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text2);cursor:pointer;padding:12px 0 16px;font-weight:500}
.archive-back:hover{color:var(--text)}
.archive-group{margin-bottom:20px}
.archive-group-title{font-size:13px;font-weight:600;letter-spacing:.04em;padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.known-title{background:var(--green-bg);color:var(--green-text)}
.unknown-title{background:var(--amber-bg);color:var(--amber-text)}
.unmarked-title{background:var(--bg2);color:var(--text2)}
.archive-list{display:flex;flex-direction:column;gap:6px}
.archive-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s}
.archive-item:hover{background:var(--bg2)}
.archive-item-word{font-size:15px;font-weight:500;min-width:110px}
.archive-item-ph{font-size:11px;color:var(--text3);font-family:"Courier New",monospace;flex:1}
.archive-item-zh{font-size:12px;color:var(--text2);text-align:right;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>

<div id="loading-screen"><i class="ti ti-loader-2 spin"></i></div>

<div id="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="ti ti-book-2"></i></div>
      <span class="login-logo-text">雅思每日词汇</span>
    </div>
    <div id="step-email">
      <p class="login-desc">登录后，学习进度在所有设备自动同步</p>
      <div class="field-label">邮箱</div>
      <input type="email" id="email-input" placeholder="输入你的邮箱" autocomplete="email" />
      <button class="login-btn" id="send-btn" onclick="sendOTP()">发送验证码</button>
      <div class="login-err" id="send-err"></div>
    </div>
    <div id="step-otp" style="display:none">
      <p class="otp-hint">验证码已发送至<br><b id="email-display"></b></p>
      <div class="field-label">6位验证码</div>
      <input type="text" id="otp-input" class="otp-input" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
      <button class="login-btn" id="verify-btn" onclick="verifyOTP()">登录</button>
      <div class="login-err" id="verify-err"></div>
      <div class="back-link" onclick="backToEmail()"><i class="ti ti-arrow-left" style="font-size:13px"></i>换个邮箱 / 重新发送</div>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-left">
      <span class="header-title">雅思词汇</span>
      <span class="day-tag" id="day-tag">Day 1</span>
    </div>
    <div class="header-right">
      <button class="archive-btn" onclick="showArchive()" id="archive-btn"><i class="ti ti-archive"></i></button>
      <span class="sync-dot" id="sync-dot"></span>
      <span class="user-email" id="user-email"></span>
      <button class="logout-btn" onclick="logout()"><i class="ti ti-logout" style="font-size:14px"></i>退出</button>
    </div>
  </header>
  <div class="progress-wrap"><div class="progress-fill" id="pbar" style="width:10%"></div></div>
  <main>
    <div id="card-area">
      <div class="card" id="vocab-card"></div>
      <div class="known-row">
        <button class="known-btn yes" onclick="markKnown(true)"><i class="ti ti-check"></i>认识</button>
        <button class="known-btn no" onclick="markKnown(false)"><i class="ti ti-x"></i>不认识</button>
      </div>
      <div class="swipe-hint" id="swipe-hint"><i class="ti ti-arrows-left-right" style="font-size:14px"></i>左右滑动切换</div>
    </div>
    <div class="done-screen" id="done-screen">
      <i class="ti ti-circle-check-filled big"></i>
      <h2>今日词汇完成！</h2>
      <p id="done-desc"></p>
      <div class="stat-row">
        <div class="stat-card"><div class="num" id="stat-known">0</div><div class="lbl">认识</div></div>
        <div class="stat-card"><div class="num" id="stat-unknown">0</div><div class="lbl">待复习</div></div>
      </div>
      <button class="restart-btn" onclick="restart()"><i class="ti ti-refresh"></i>重新复习</button>
    </div>

    <!-- 归档页 -->
    <div id="archive-screen" style="display:none">
      <div class="archive-back" onclick="hideArchive()"><i class="ti ti-arrow-left"></i> 返回学习</div>
      <div class="archive-group" id="archive-known">
        <div class="archive-group-title known-title"><i class="ti ti-check-circle"></i> 认识 <span id="known-count">0</span> 个</div>
        <div class="archive-list" id="known-list"></div>
      </div>
      <div class="archive-group" id="archive-unknown">
        <div class="archive-group-title unknown-title"><i class="ti ti-refresh-alert"></i> 待复习 <span id="unknown-count">0</span> 个</div>
        <div class="archive-list" id="unknown-list"></div>
      </div>
      <div class="archive-group" id="archive-unmarked">
        <div class="archive-group-title unmarked-title"><i class="ti ti-circle-dashed"></i> 未标记 <span id="unmarked-count">0</span> 个</div>
        <div class="archive-list" id="unmarked-list"></div>
      </div>
    </div>
  </main>
  <nav id="main-nav">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)" disabled><i class="ti ti-arrow-left"></i>上一个</button>
    <div class="counter"><b id="cur-num">1</b> / <span id="total-num">56</span></div>
    <button class="nav-btn" id="btn-next" onclick="navigate(1)">下一个<i class="ti ti-arrow-right"></i></button>
  </nav>
</div>

nes": ["个人成长", "心理发展", "金融投资"], "tip": "emotional maturity（情感成熟）是高频搭配。金融语境中 maturity 指债券到期日，意思截然不同，注意区分。"}, {"word": "extent", "phonetic": "/ɪkˈstent/", "pos": "n.", "zh": "范围；面积；程度", "ex_en": "The full <em>extent</em> of the environmental damage caused by the oil spill is still being assessed.", "ex_zh": "石油泄漏造成的环境破坏的全部程度仍在评估之中。", "scenes": ["灾害评估", "学术论证", "问题讨论"], "tip": "to some/a certain extent（在一定程度上）、to a great extent（很大程度上）是雅思写作核心句式。"}, {"word": "surge", "phonetic": "/sɜːdʒ/", "pos": "v./n.", "zh": "涌动，猛增；（感情等的）洋溢；猛涨", "ex_en": "There has been a dramatic <em>surge</em> in demand for electric vehicles over the past three years.", "ex_zh": "过去三年，电动汽车需求量急剧激增。", "scenes": ["市场趋势", "人口流动", "能源议题"], "tip": "surge（短期内快速猛增，带有突发性）vs increase（泛指增加）vs rise（缓慢上升）。a surge in / a surge of 是常用搭配。"}, {"word": "justify", "phonetic": "/ˈdʒʌstɪfaɪ/", "pos": "v.", "zh": "证明……为正当的；为……辩护", "ex_en": "The government struggled to <em>justify</em> the enormous cost of the infrastructure project to taxpayers.", "ex_zh": "政府难以向纳税人证明该基础设施项目的巨额成本是合理的。", "scenes": ["政策辩护", "学术论证", "道德讨论"], "tip": "justify（证明有充分理由）vs defend（辩护，强调抵御批评）。名词 justification 常用：there is no justification for...。"}, {"word": "persuade", "phonetic": "/pəˈsweɪd/", "pos": "v.", "zh": "说服，劝说；使相信", "ex_en": "Advertisers use psychological techniques to <em>persuade</em> consumers that they need products they might not otherwise buy.", "ex_zh": "广告商运用心理技巧，说服消费者相信自己需要那些本来不会购买的产品。", "scenes": ["广告营销", "人际关系", "政治演讲"], "tip": "persuade sb to do（说服做某事）vs convince sb of / that（使相信某事）。convince 更强调改变认知，persuade 更强调促使行动。"}, {"word": "migration", "phonetic": "/maɪˈɡreɪʃn/", "pos": "n.", "zh": "迁徙，移居，移民", "ex_en": "Climate change is projected to trigger large-scale human <em>migration</em> from low-lying coastal regions.", "ex_zh": "气候变化预计将引发大规模沿海低洼地区人口迁移。", "scenes": ["环境与气候", "人口研究", "生物科学"], "tip": "migration（泛指迁移，人或动物均可）vs immigration（外来移入某国）vs emigration（向外移出某国）。"}, {"word": "cooperation", "phonetic": "/kəʊˌɒpəˈreɪʃn/", "pos": "n.", "zh": "合作，协作；配合", "ex_en": "Effective international <em>cooperation</em> is essential to addressing global challenges such as climate change.", "ex_zh": "有效的国际合作对于应对气候变化等全球性挑战至关重要。", "scenes": ["国际关系", "团队项目", "政策制定"], "tip": "cooperation（强调共同努力达成目标）vs collaboration（更强调创意性、密切的协同工作）。in cooperation with sb 是固定搭配。"}, {"word": "deliberate", "phonetic": "/dɪˈlɪbərət/", "pos": "a.", "zh": "故意的；深思熟虑的；从容不迫的", "ex_en": "The misleading statistics in the report appeared to be a <em>deliberate</em> attempt to distort public perception.", "ex_zh": "报告中的误导性数据似乎是故意扭曲公众认知的行为。", "scenes": ["法律评判", "道德分析", "决策过程"], "tip": "deliberate（adj. 有意为之）vs accidental（意外的）。动词形式读音不同：/dɪˈlɪbəreɪt/，指深思熟虑、审议讨论。"}, {"word": "implication", "phonetic": "/ˌɪmplɪˈkeɪʃn/", "pos": "n.", "zh": "含意；暗示；卷入，牵连", "ex_en": "The study has far-reaching <em>implications</em> for how we design public health interventions.", "ex_zh": "这项研究对我们如何设计公共卫生干预措施具有深远影响。", "scenes": ["学术分析", "政策影响", "逻辑推理"], "tip": "implications（通常用复数，指潜在影响或后果）vs consequences（已发生的结果）vs significance（重要性）。by implication（言下之意）是固定短语。"}, {"word": "sponsor", "phonetic": "/ˈspɒnsə(r)/", "pos": "n./vt.", "zh": "发起者，赞助人；主办者；主顾；赞助，资助", "ex_en": "The research was <em>sponsored</em> by a pharmaceutical company, raising concerns about potential bias.", "ex_zh": "该研究由一家制药公司赞助，这引发了对潜在偏见的担忧。", "scenes": ["学术研究", "体育赛事", "艺术文化"], "tip": "sponsor（提供资金支持，通常换取宣传利益）vs fund（资助，不强调回报）vs subsidise（政府补贴）。"}, {"word": "decisive", "phonetic": "/dɪˈsaɪsɪv/", "pos": "a.", "zh": "决定性的；果断的", "ex_en": "<em>Decisive</em> action by the emergency services in the early hours prevented a far greater disaster.", "ex_zh": "应急服务部门在最初几小时内的果断行动避免了更大规模的灾难。", "scenes": ["军事历史", "领导力", "危机管理"], "tip": "decisive（形容人=果断；形容事件=决定性的）vs determined（坚定，强调意志力）vs conclusive（结论性的，用于证据/结果）。"}, {"word": "substantial", "phonetic": "/səbˈstænʃl/", "pos": "a.", "zh": "可观的，大量的；坚固的，结实的；实质性的", "ex_en": "The programme received <em>substantial</em> funding from both the government and the private sector.", "ex_zh": "该项目获得了政府和私营部门的大量资金支持。", "scenes": ["经济数据", "政策评估", "学术论证"], "tip": "substantial（数量可观或程度显著）vs significant（有重要意义）vs considerable（相当大的）。三者语义接近，雅思写作中可轮换以避免重复。"}, {"word": "questionnaire", "phonetic": "/ˌkwestʃəˈneə(r)/", "pos": "n.", "zh": "问卷，调查表", "ex_en": "Participants were asked to complete an online <em>questionnaire</em> about their daily commuting habits.", "ex_zh": "参与者被要求填写一份关于日常通勤习惯的在线问卷。", "scenes": ["社会调查", "学术研究", "市场营销"], "tip": "questionnaire（书面问卷）vs survey（调查，范围更广，可含访谈等）vs interview（面对面访谈）。雅思听力和阅读中极高频。"}, {"word": "viewpoint", "phonetic": "/ˈvjuːpɔɪnt/", "pos": "n.", "zh": "观点，看法；视角", "ex_en": "The panel discussion brought together experts with very different <em>viewpoints</em> on immigration policy.", "ex_zh": "小组讨论汇聚了在移民政策问题上持截然不同观点的专家。", "scenes": ["学术讨论", "新闻报道", "社会议题"], "tip": "viewpoint（个人或群体的立场与视角）vs perspective（更强调思考框架）vs opinion（意见，更日常）。雅思写作中三者均高频。"}, {"word": "routine", "phonetic": "/ruːˈtiːn/", "pos": "n./a.", "zh": "例行公事；惯例；常规的，例行的", "ex_en": "Establishing a consistent morning <em>routine</em> can significantly boost focus and daily productivity.", "ex_zh": "建立固定的晨间惯例可以显著提高注意力和日常工作效率。", "scenes": ["生活习惯", "职场管理", "健康议题"], "tip": "routine（有规律的重复安排）vs habit（习惯，强调个人行为倾向）vs custom（习俗，强调社会或文化层面）。"}, {"word": "nurture", "phonetic": "/ˈnɜːtʃə(r)/", "pos": "vt./n.", "zh": "培养；滋养；营养品", "ex_en": "Parents and schools both play a vital role in <em>nurturing</em> children's emotional intelligence.", "ex_zh": "父母和学校在培养孩子的情商方面都发挥着至关重要的作用。", "scenes": ["教育成长", "亲子关系", "心理发展"], "tip": "nature vs nurture（先天 vs 后天）是心理学/教育类雅思题目的经典对立概念，必须掌握。"}, {"word": "genetic", "phonetic": "/dʒəˈnetɪk/", "pos": "a.", "zh": "遗传的；基因的", "ex_en": "Scientists have identified several <em>genetic</em> markers that may increase susceptibility to the disease.", "ex_zh": "科学家已发现几种可能增加该疾病易感性的遗传标记。", "scenes": ["医学科技", "生物研究", "伦理讨论"], "tip": "genetic（与基因/遗传有关）vs hereditary（遗传性的，多指遗传病）。genetic engineering / genetic modification 是雅思科技类高频词组。"}, {"word": "surpass", "phonetic": "/səˈpɑːs/", "pos": "vt.", "zh": "超越，超过；优于", "ex_en": "This year's renewable energy output has <em>surpassed</em> all previous records.", "ex_zh": "今年的可再生能源产量已超越所有历史记录。", "scenes": ["科技进步", "成就对比", "经济数据"], "tip": "surpass（在数量、质量或成就上超越）vs exceed（超出限定范围或数值）vs outperform（表现优于，多用于商业/运动）。"}, {"word": "allocate", "phonetic": "/ˈæləkeɪt/", "pos": "vt.", "zh": "分配；把……拨给", "ex_en": "The committee decided to <em>allocate</em> a larger portion of the budget to healthcare and education.", "ex_zh": "委员会决定将更大比例的预算分配给医疗卫生和教育领域。", "scenes": ["政府预算", "资源管理", "项目规划"], "tip": "allocate（正式分配资源/资金）vs distribute（分发，强调给到各方）vs assign（指派任务/角色给某人）。"}, {"word": "inequality", "phonetic": "/ˌɪnɪˈkwɒlətɪ/", "pos": "n.", "zh": "不平等，不平均；不等式", "ex_en": "Growing income <em>inequality</em> is one of the most pressing challenges facing modern societies.", "ex_zh": "收入不平等加剧，是现代社会面临的最紧迫挑战之一。", "scenes": ["社会公正", "经济研究", "政策讨论"], "tip": "inequality（不平等，可指收入、机会、权利等各方面）vs disparity（差距，更强调数量上的悬殊）vs gap（差距，更口语化）。"}, {"word": "legitimate", "phonetic": "/lɪˈdʒɪtɪmət/", "pos": "a.", "zh": "合法的；正当的；合情合理的", "ex_en": "Employees have a <em>legitimate</em> right to expect a safe and fair working environment.", "ex_zh": "员工有权合理地期待一个安全公平的工作环境。", "scenes": ["法律权利", "商业道德", "政策评估"], "tip": "legitimate（符合法律或公认规范的）vs legal（合法的，特指符合成文法律）vs valid（有效的，强调有充分根据）。"}, {"word": "ambiguous", "phonetic": "/æmˈbɪɡjuəs/", "pos": "a.", "zh": "模棱两可的；不明确的；不清晰的", "ex_en": "The wording of the contract was <em>ambiguous</em>, leading to a dispute between the two parties.", "ex_zh": "合同措辞模棱两可，导致双方产生纠纷。", "scenes": ["法律文件", "学术写作", "沟通表达"], "tip": "ambiguous（可作多种解读，令人困惑）vs vague（含糊，信息不够具体）vs obscure（晦涩难懂，多指表达或概念）。"}, {"word": "inevitably", "phonetic": "/ɪnˈevɪtəblɪ/", "pos": "ad.", "zh": "不可避免地；必然地", "ex_en": "Rapid urbanisation <em>inevitably</em> leads to increased pressure on public transport systems.", "ex_zh": "快速城镇化不可避免地导致公共交通系统压力增大。", "scenes": ["因果分析", "趋势预测", "议论写作"], "tip": "inevitably（强调结果必然发生，无法避免）vs eventually（最终，强调时间上的必然）vs consequently（因此，强调因果关系）。"}, {"word": "guidance", "phonetic": "/ˈɡaɪdns/", "pos": "n.", "zh": "指引，指导；咨询", "ex_en": "Students are encouraged to seek <em>guidance</em> from their tutors before submitting final assignments.", "ex_zh": "学生在提交最终作业前，应主动向导师寻求指导。", "scenes": ["教育辅导", "职业规划", "心理支持"], "tip": "guidance（指引方向，强调过程）vs advice（建议，强调内容）vs instruction（指令，更具体、权威）。"}, {"word": "frequent", "phonetic": "/ˈfriːkwənt/", "pos": "a.", "zh": "频繁的，常见的，常用的", "ex_en": "The area experiences <em>frequent</em> flooding during the rainy season, disrupting daily life.", "ex_zh": "雨季期间该地区频繁发生洪涝，严重影响日常生活。", "scenes": ["气候描述", "数据报告", "问题分析"], "tip": "frequent（强调发生频率高）vs common（强调普遍存在）vs regular（强调有规律地出现）。"}, {"word": "purpose", "phonetic": "/ˈpɜːpəs/", "pos": "n.", "zh": "目的，意图；用途；效果", "ex_en": "The main <em>purpose</em> of the study is to identify factors that influence consumer behaviour.", "ex_zh": "该研究的主要目的是找出影响消费者行为的因素。", "scenes": ["学术写作", "项目说明", "目标陈述"], "tip": "purpose（做某事的原因或目标）vs aim（目标，更正式）vs intention（意图，强调主观打算）。on purpose（故意地）是固定短语。"}, {"word": "variety", "phonetic": "/vəˈraɪətɪ/", "pos": "n.", "zh": "品种，种类；变化，多样化", "ex_en": "A <em>variety</em> of measures have been proposed to address the issue of urban congestion.", "ex_zh": "已有多种措施被提出以解决城市交通拥堵问题。", "scenes": ["政策讨论", "生物多样性", "文化多元"], "tip": "a variety of（多种多样的）= various。注意 variety 本身不可数，但 a variety of 后接可数名词复数。"}, {"word": "leadership", "phonetic": "/ˈliːdəʃɪp/", "pos": "n.", "zh": "领导，领导层；领导能力", "ex_en": "Effective <em>leadership</em> is critical during times of crisis, when clear decisions must be made quickly.", "ex_zh": "在危机时期，有效的领导力至关重要，需要迅速作出明确决策。", "scenes": ["管理学", "政治议题", "组织行为"], "tip": "leadership（领导力这一能力/素质）vs management（管理，强调日常事务）。under the leadership of（在……的领导下）是固定搭配。"}, {"word": "nuclear", "phonetic": "/ˈnjuːklɪə(r)/", "pos": "a.", "zh": "核能的，原子能的；核武器的；细胞核的", "ex_en": "The debate over <em>nuclear</em> energy has intensified as countries seek to reduce carbon emissions.", "ex_zh": "随着各国努力减少碳排放，核能争议愈发激烈 ve shown measurable results in major cities.", "ex_zh": "政府改善空气质量的努力在主要城市已取得可量化的成果。", "scenes": ["政策评估", "个人奋斗", "国际合作"], "tip": "make an effort / make efforts（作出努力）是固定搭配。efforts（复数）更强调持续的多方尝试。vs attempt（尝试，含单次行动之意）。"}, {"word": "complicate", "phonetic": "/ˈkɒmplɪkeɪt/", "pos": "vt.", "zh": "使变复杂；使难以理解", "ex_en": "The discovery of a new variant has further <em>complicated</em> efforts to develop an effective vaccine.", "ex_zh": "新变体的发现进一步增加了开发有效疫苗的难度。", "scenes": ["医学科研", "政策制定", "问题分析"], "tip": "complicate（使本已复杂的事情更难处理）vs complicate matters（使情况更复杂）是固定用法。名词 complication（并发症；使情况变复杂的因素）在雅思阅读中常见。"}, {"word": "refer", "phonetic": "/rɪˈfɜː(r)/", "pos": "v.", "zh": "参考，查阅；提到，谈及；引用；提交", "ex_en": "The report <em>refers</em> to several studies that link air pollution with respiratory illness.", "ex_zh": "该报告引用了多项将空气污染与呼吸道疾病相关联的研究。", "scenes": ["学术写作", "报告引用", "信息查阅"], "tip": "refer to（提到；参考；指）是核心短语。不要与 reference 混淆：名词用 reference to（提及），动词用 refer to。"}, {"word": "federation", "phonetic": "/ˌfedəˈreɪʃn/", "pos": "n.", "zh": "联邦；同盟；联合会", "ex_en": "The trade <em>federation</em> represents over 200 member companies across twelve countries.", "ex_zh": "该贸易联合会代表着分布在十二个国家的200多家成员企业。", "scenes": ["政治体制", "国际组织", "商业联盟"], "tip": "federation（由多个单位自愿组成的联盟，成员保留一定自治权）vs union（联合，通常更紧密）vs alliance（联盟，强调共同目的）。"}, {"word": "physical", "phonetic": "/ˈfɪzɪkl/", "pos": "a.", "zh": "身体的，肉体的；物理的；物质的，有形的", "ex_en": "Regular <em>physical</em> activity is one of the most effective ways to prevent chronic disease.", "ex_zh": "定期参加体育活动是预防慢性病最有效的方式之一。", "scenes": ["医疗健康", "教育体育", "物理科学"], "tip": "physical（有形的、身体的）vs mental（精神的）vs psychological（心理的）。physical exercise / physical health / physical environment 均是雅思高频搭配。"}, {"word": "occupy", "phonetic": "/ˈɒkjʊpaɪ/", "pos": "vt.", "zh": "占用，占领；（使）忙碌于；居住", "ex_en": "Administrative tasks <em>occupy</em> a significant portion of teachers' working time.", "ex_zh": "行政事务占据了教师大量的工作时间。", "scenes": ["时间管理", "政治军事", "工作场景"], "tip": "occupy（占据空间、时间或注意力）。be occupied with（忙于……）、occupy one's time（占用时间）是常见搭配。"}, {"word": "ceremony", "phonetic": "/ˈserɪmənɪ/", "pos": "n.", "zh": "典礼；仪式；礼节", "ex_en": "The opening <em>ceremony</em> of the international conference was attended by representatives from 50 nations.", "ex_zh": "国际会议的开幕式吸引了来自50个国家的代表参加。", "scenes": ["文化传统", "国际活动", "学术场景"], "tip": "ceremony（正式的仪式性活动）vs event（活动，更泛指）vs ritual（仪式，更强调重复性的宗教/文化行为）。"}, {"word": "diagnose", "phonetic": "/ˈdaɪəɡnəʊz/", "pos": "v.", "zh": "诊断；判断（问题原因）", "ex_en": "The condition is often difficult to <em>diagnose</em> in its early stages because symptoms are mild.", "ex_zh": "该病症在早期往往难以诊断，因为症状轻微。", "scenes": ["医疗健康", "问题分析", "科技应用"], "tip": "diagnose sb with sth（诊断某人患有……）是固定搭配。名词 diagnosis（诊断结果）在雅思阅读中出现频率高。"}, {"word": "resource", "phonetic": "/rɪˈzɔːs/", "pos": "n.", "zh": "[pl.] 资源，财力；应付办法，谋略", "ex_en": "The effective management of natural <em>resources</em> is critical to achieving sustainable development.", "ex_zh": "有效管理自然资源对于实现可持续发展至关重要。", "scenes": ["环境保护", "经济发展", "教育资源"], "tip": "resources（通常用复数，指可用资源）。natural resources（自然资源）、human resources（人力资源）、financial resources（财力资源）是雅思三大核心搭配。"}, {"word": "summit", "phonetic": "/ˈsʌmɪt/", "pos": "n.", "zh": "（山等的）最高点，峰顶；（外交等的）最高级会议", "ex_en": "World leaders gathered at the climate <em>summit</em> to negotiate binding emissions targets.", "ex_zh": "世界领导人齐聚气候峰会，就具有约束力的减排目标展开谈判。", "scenes": ["国际外交", "环境政策", "登山描述"], "tip": "summit（峰顶；也指最高级别的外交会议）。a summit meeting / climate summit / G7 summit 是雅思新闻类阅读高频词。"}, {"word": "ensure", "phonetic": "/ɪnˈʃʊə(r)/", "pos": "vt.", "zh": "确保，保证；担保；赋予", "ex_en": "Strict quality controls are in place to <em>ensure</em> that all products meet international safety standards.", "ex_zh": "严格的质量控制措施已到位，以确保所有产品符合国际安全标准。", "scenes": ["质量管理", "政策实施", "学术写作"], "tip": "ensure（确保结果一定发生）vs assure（向某人保证，强调消除疑虑）vs insure（为……投保）。三者发音和用法易混，务必区分。"}, {"word": "accurate", "phonetic": "/ˈækjərət/", "pos": "a.", "zh": "正确无误的；精确的；准确的", "ex_en": "Scientists stressed the importance of collecting <em>accurate</em> data to draw reliable conclusions.", "ex_zh": "科学家强调收集准确数据对得出可靠结论的重要性。", "scenes": ["科学研究", "新闻报道", "数据分析"], "tip": "accurate（与事实完全相符，强调无误差）vs precise（精确，强调细致程度）vs exact（确切的，强调与特定值一致）。"}, {"word": "superior", "phonetic": "/suːˈpɪərɪə(r)/", "pos": "a.", "zh": "上级的；优越的；优于……的", "ex_en": "Electric vehicles are considered <em>superior</em> to conventional cars in terms of long-term environmental impact.", "ex_zh": "从长期环境影响来看，电动汽车被认为优于传统汽车。", "scenes": ["产品比较", "职场层级", "学术评价"], "tip": "superior to（优于……）是固定搭配，to 不能换成 than。vs inferior to（劣于……）是反义搭配。"}, {"word": "perform", "phonetic": "/pəˈfɔːm/", "pos": "v.", "zh": "履行，执行，完成；表演，演出；（机器）运作", "ex_en": "Countries that invest heavily in education tend to <em>perform</em> better on international competitiveness rankings.", "ex_zh": "大力投资教育的国家往往在国际竞争力排名上表现更好。", "scenes": ["学术评估", "艺术表演", "职场绩效"], "tip": "perform well / poorly（表现好/差）。perform a task / surgery / experiment 是常见搭配。名词 performance（表演；绩效）雅思中高频。"}, {"word": "opponent", "phonetic": "/əˈpəʊnənt/", "pos": "n.", "zh": "敌手，对手；反对者", "ex_en": "Opponents of the new policy argue that it will disproportionately affect low-income families.", "ex_zh": "新政策的反对者认为，它将不成比例地影响低收入家庭。", "scenes": ["政策辩论", "体育竞技", "学术讨论"], "tip": "opponent（在竞争或辩论中站在对立面的人）vs rival（竞争对手，强调长期竞争关系）vs enemy（敌人，含敌意）。"}, {"word": "literature", "phonetic": "/ˈlɪtrətʃə(r)/", "pos": "n.", "zh": "文学（作品）；（某领域的）文献资料", "ex_en": "A review of the <em>literature</em> on climate change reveals considerable disagreement among researchers.", "ex_zh": "对气候变化相关文献的梳理揭示了研究人员之间存在相当大的分歧。", "scenes": ["学术写作", "文化艺术", "研究方法"], "tip": "literature 在学术语境中指文献（不可数）：the literature on X = X 领域的学术文献。别只记文学这一个意思。"}, {"word": "suffer", "phonetic": "/ˈsʌfə(r)/", "pos": "v.", "zh": "遭受，忍受；受损失；患病", "ex_en": "Many coastal communities <em>suffer</em> from the combined effects of rising sea levels and increased storm intensity.", "ex_zh": "许多沿海社区遭受海平面上升和风暴强度增加双重影响之苦。", "scenes": ["自然灾害", "社会问题", "医疗健康"], "tip": "suffer from（患有某病；深受……之苦）是核心搭配。suffer a loss / defeat（遭受损失/失败）也是固定用法。"}, {"word": "impede", "phonetic": "/ɪmˈpiːd/", "pos": "vt.", "zh": "阻碍，妨碍，阻挠", "ex_en": "Excessive regulation can <em>impede</em> innovation and slow down economic growth.", "ex_zh": "过度监管会阻碍创新，拖慢经济增长。", "scenes": ["政策批评", "经济分析", "科技发展"], "tip": "impede（阻碍进程）vs hinder（妨碍，更口语）vs obstruct（物理或有意阻拦）vs hamper（妨碍，使困难增大）。雅思写作中 impede 最书面正式。"}, {"word": "biological", "phonetic": "/ˌbaɪəˈlɒdʒɪkl/", "pos": "a.", "zh": "生物的；生物学的，有关生物学的", "ex_en": "The <em>biological</em> diversity of rainforests makes them invaluable for medical research.", "ex_zh": "热带雨林的生物多样性使其对医学研究具有不可估量的价值。", "scenes": ["生态环境", "医学科研", "生命科学"], "tip": "biological（与生命体或生物学相关）。biological diversity（生物多样性）、biological weapon（生化武器）、biological clock（生物钟）是雅思中常见搭配。"}, {"word": "deduce", "phonetic": "/dɪˈdjuːs/", "pos": "v.", "zh": "演绎，推断，推论", "ex_en": "From the fossil records, scientists were able to <em>deduce</em> that the species lived in warm, shallow seas.", "ex_zh": "通过化石记录，科学家能够推断该物种生活在温暖的浅海中。", "scenes": ["科学研究", "逻辑推理", "学术论证"], "tip": "deduce（从已知事实推出结论，强调逻辑演绎）vs infer（推断，更宽泛，可基于暗示）vs conclude（得出结论，通常在充分论证后）。"}, {"word": "absolute", "phonetic": "/ˈæbsəluːt/", "pos": "a.", "zh": "完全的，绝对的，纯粹的；无条件的", "ex_en": "There is no <em>absolute</em> solution to poverty; it requires coordinated action across multiple sectors.", "ex_zh": "贫困没有绝对的解决方案；需要多个部门协调行动。", "scenes": ["学术论证", "政策讨论", "哲学分析"], "tip": "absolute（不存在例外或条件限制的）。in absolute terms（从绝对量上看）vs in relative terms（从相对量上看）是雅思数据描述常用对比句式。"}, {"word": "theoretical", "phonetic": "/ˌθɪəˈretɪkl/", "pos": "a.", "zh": "理论（上）的；理论性的", "ex_en": "The concept remains largely <em>theoretical</em>, as no large-scale trials have been conducted yet.", "ex_zh": "这个概念在很大程度上仍停留于理论层面，因为尚未开展大规模试验。", "scenes": ["学术研究", "科学发现", "教育讨论"], "tip": "theoretical（理论上存在或成立的）vs practical（实践层面的）。in theory vs in practice（理论上 vs 实际上）是雅思写作常见对比句式。"}, {"word": "surroundings", "phonetic": "/səˈraʊndɪŋz/", "pos": "n.", "zh": "周围的事物，环境", "ex_en": "Children who grow up in stimulating <em>surroundings</em> tend to develop stronger cognitive abilities.", "ex_zh": "在丰富刺激的环境中成长的孩子往往能发展出更强的认知能力。", "scenes": ["教育成长", "城市设计", "心理健康"], "tip": "surroundings（物质环境，特指某人所处的周边环境）vs environment（更广，可指社会/政治/自然环境）vs setting（场景，强调背景氛围）。"}, {"word": "voluntary", "phonetic": "/ˈvɒləntərɪ/", "pos": "a.", "zh": "自愿的，志愿的；义务的", "ex_en": "The organisation depends largely on <em>voluntary</em> contributions from members of the public.", "ex_zh": "该组织在很大程度上依赖公众的自愿捐款。", "scenes": ["社会服务", "公民参与", "非营利组织"], "tip": "voluntary（出于自愿，无报酬）vs compulsory（强制性的）。voluntary sector（志愿部门/非营利组织）是雅思社会类高频词组。"}, {"word": "commercial", "phonetic": "/kəˈmɜːʃl/", "pos": "a.", "zh": "商业的，商品化的，贸易的", "ex_en": "The invention was initially developed for military use but later found widespread <em>commercial</em> applications.", "ex_zh": "这项发明最初用于军事，但后来发现了广泛的商业应用。", "scenes": ["科技转化", "经济发展", "广告传媒"], "tip": "commercial（以商业利益为目的）vs industrial（工业的）vs trade（贸易的）。commercial success（商业成功）、commercial break（广告插播）是常见搭配。"}, {"word": "notion", "phonetic": "/ˈnəʊʃn/", "pos": "n.", "zh": "概念，观念；想法，主张", "ex_en": "The <em>notion</em> that intelligence is fixed from birth has been challenged by recent neuroscience research.", "ex_zh": "智力从出生起就固定不变的观念，已受到近期神经科学研究的挑战。", "scenes": ["学术讨论", "哲学思考", "教育理念"], "tip": "notion（较为抽象的观念或看法）vs concept（概念，更系统化）vs idea（想法，最日常化）。challenge / reject / support the notion that... 是学术写作常见句式。"}, {"word": "actual", "phonetic": "/ˈæktʃuəl/", "pos": "a.", "zh": "实际的；真实的；现实的", "ex_en": "The <em>actual</em> cost of the project turned out to be twice the original estimate.", "ex_zh": "该项目的实际成本最终是最初估算的两倍。", "scenes": ["数据对比", "结果分析", "学术写作"], "tip": "actual（真实存在的，与预期或名义上的相对）vs real（真实的，强调非虚假）vs genuine（真正的，强调非伪造）。in actual fact（事实上）是书面表达固定短语。"}, {"word": "instrument", "phonetic": "/ˈɪnstrəmənt/", "pos": "n.", "zh": "仪器；手段；工具；乐器", "ex_en": "Education is often described as the most powerful <em>instrument</em> for social change.", "ex_zh": "教育常被描述为推动社会变革最有力的手段。", "scenes": ["政策议题", "科学测量", "音乐艺术"], "tip": "instrument（达到目的的手段或工具；也指仪器/乐器）。an instrument of change / policy / measurement 是雅思常见表达。"}, {"word": "compulsory", "phonetic": "/kəmˈpʌlsərɪ/", "pos": "a.", "zh": "强制性的；义务的；必修的", "ex_en": "Physical education is <em>compulsory</em> in most primary schools to promote healthy lifestyles from an early age.", "ex_zh": "大多数小学将体育课列为必修科目，以从小培养健康的生活方式。", "scenes": ["教育制度", "法律规定", "公民义务"], "tip": "compulsory（法律或规定强制要求）vs mandatory（与 compulsory 几乎同义，更多用于正式文件）vs obligatory（有义务的，常用于道德层面）。"}, {"word": "expense", "phonetic": "/ɪkˈspens/", "pos": "n.", "zh": "花费，开支；消费，消耗；代价，损失", "ex_en": "The rising <em>expense</em> of higher education is putting university out of reach for many families.", "ex_zh": "高等教育费用的不断上涨，使许多家庭难以负担大学开销。", "scenes": ["经济议题", "教育政策", "生活成本"], "tip": "expense（花费的金钱）vs cost（成本，更泛指）vs expenditure（支出，更正式，多指大额或官方支出）。at the expense of（以……为代价）是固定短语。"}, {"word": "originate", "phonetic": "/əˈrɪdʒɪneɪt/", "pos": "v.", "zh": "起源于；产生；首创", "ex_en": "Many words in the English language <em>originated</em> from Latin and ancient Greek.", "ex_zh": "英语中许多单词起源于拉丁语和古希腊语。", "scenes": ["历史文化", "科学发现", "语言学习"], "tip": "originate from / in（起源于）是固定搭配。vs derive from（源自，多用于抽象概念）vs stem from（源于，多指原因）。"}, {"word": "unique", "phonetic": "/juːˈniːk/", "pos": "a.", "zh": "唯一的，独一无二的；极不寻常的", "ex_en": "Each country's approach to healthcare reflects its <em>unique</em> cultural and historical context.", "ex_zh": "每个国家的医疗体系都反映了其独特的文化和历史背景。", "scenes": ["文化比较", "产品设计", "学术分析"], "tip": "unique（唯一的，逻辑上不能用 very / quite / rather 修饰，因为不存在程度之分）。但口语中 quite unique 已被广泛接受。"}, {"word": "inclusive", "phonetic": "/ɪnˈkluːsɪv/", "pos": "a.", "zh": "包含一切费用在内的；包容广阔的；全纳的", "ex_en": "Schools are encouraged to create more <em>inclusive</em> environments that support students with diverse learning needs.", "ex_zh": "学校被鼓励创建更具包容性的环境，以支持有不同学习需求的学生。", "scenes": ["教育政策", "社会公平", "多元文化"], "tip": "inclusive（包容所有人，不排斥任何群体）vs exclusive（排他的；高档的）。inclusive education（全纳教育）是雅思教育类高频词组。"}, {"word": "reservation", "phonetic": "/ˌrezəˈveɪʃn/", "pos": "n.", "zh": "保留意见；预订，预定；自然保护区", "ex_en": "Several board members expressed <em>reservations</em> about the proposed merger.", "ex_zh": "几位董事会成员对拟议的合并表示保留意见。", "scenes": ["政策讨论", "酒店预订", "自然保护"], "tip": "have reservations about（对……有顾虑/保留意见）是学术写作常见表达。不要只记预订这个意思——保留意见在雅思写作和阅读中更常见。"}, {"word": "transcript", "phonetic": "/ˈtrænskrɪpt/", "pos": "n.", "zh": "抄本，副本；文字记录；成绩单", "ex_en": "Applicants must submit official academic <em>transcripts</em> along with their application forms.", "ex_zh": "申请人须随申请表一并提交官方成绩单。", "scenes": ["学术申请", "法律记录", "媒体整理"], "tip": "transcript（成绩单；会议/演讲的文字记录）。雅思听力场景中 transcript 常出现在大学申请类对话中。"}, {"word": "reasonable", "phonetic": "/ˈriːznəbl/", "pos": "a.", "zh": "合理的，有道理的；通情达理的；适度的", "ex_en": "The committee concluded that the proposed budget was <em>reasonable</em> given the scope of the project.", "ex_zh": "委员会得出结论，考虑到项目规模，所提议的预算是合理的。", "scenes": ["政策评估", "日常沟通", "学术写作"], "tip": "reasonable（基于理性，说得通的）vs rational（理性的，基于逻辑）vs sensible（明智的，基于常识）。三者均含合理之意，但角度不同。"}, {"word": "emergency", "phonetic": "/ɪˈmɜːdʒənsɪ/", "pos": "n.", "zh": "紧急情况，突发事件；紧急状态", "ex_en": "The government declared a state of <em>emergency</em> following the catastrophic flooding in the southern regions.", "ex_zh": "南部地区发生灾难性洪灾后，政府宣布进入紧急状态。", "scenes": ["自然灾害", "医疗救援", "公共卫生"], "tip": "emergency（突发的、需立即处理的紧急情况）。in case of emergency（紧急情况下）、emergency services（紧急服务机构）是固定搭配。"}, {"word": "legacy", "phonetic": "/ˈleɡəsɪ/", "pos": "n.", "zh": "遗产，遗赠；（历史/前人留下的）影响", "ex_en": "The industrial revolution left a complex <em>legacy</em>, bringing both economic prosperity and environmental damage.", "ex_zh": "工业革命留下了复杂的历史遗产，既带来了经济繁荣，也造成了环境破坏。", "scenes": ["历史评价", "文化传承", "科技发展"], "tip": "legacy（前人留下的财富或影响，可正可负）。a lasting legacy（持久的影响）、the legacy of colonialism（殖民主义的遗留影响）是雅思高频表达。"}, {"word": "leisure", "phonetic": "/ˈleʒə(r)/", "pos": "n.", "zh": "空闲时间；悠闲", "ex_en": "As automation replaces many jobs, the question of how people use their <em>leisure</em> time becomes increasingly important.", "ex_zh": "随着自动化取代许多工作，人们如何利用闲暇时间的问题变得愈发重要。", "scenes": ["工作与生活", "科技影响", "社会变迁"], "tip": "leisure time（闲暇时间）vs free time（空闲时间，更口语）vs recreation（娱乐消遣，强调活动本身）。leisure industry（休闲产业）是雅思商业类词汇。"}, {"word": "overlap", "phonetic": "/ˌəʊvəˈlæp/", "pos": "v.", "zh": "（使）部分重叠，交叠；（时间/内容）有重合", "ex_en": "The responsibilities of the two departments <em>overlap</em> in several areas, leading to confusion.", "ex_zh": "两个部门的职责在若干领域有所重叠，导致出现混乱。", "scenes": ["组织管理", "学术分类", "时间安排"], "tip": "overlap（部分重叠，不完全一样但有共同部分）vs coincide（完全重合）。名词 overlap 同样常用：there is an overlap between A and B。"}, {"word": "counterpart", "phonetic": "/ˈkaʊntəpɑːt/", "pos": "n.", "zh": "与对方地位相当的人；配对物；副本", "ex_en": "The minister met with her <em>counterpart</em> from the neighbouring country to discuss trade agreements.", "ex_zh": "该部长与邻国同级别官员会面，讨论贸易协议。", "scenes": ["国际外交", "职场对比", "行业比较"], "tip": "counterpart（在另一方中担任相似职位或发挥相似功能的人/物）vs equivalent（等价物，强调价值相当）。"}, {"word": "mechanism", "phonetic": "/ˈmekənɪzəm/", "pos": "n.", "zh": "机械装置；机制，机理；办法，手段", "ex_en": "The brain's reward <em>mechanism</em> plays a key role in shaping human behaviour and decision-making.", "ex_zh": "大脑的奖励机制在塑造人类行为和决策方面发挥着关键作用。", "scenes": ["生物科学", "政策制度", "心理学"], "tip": "mechanism（实现某一结果的具体方式或内在系统）。a coping mechanism（应对机制）、defence mechanism（防御机制）是雅思心理/社会类高频搭配。"}, {"word": "dispute", "phonetic": "/dɪˈspjuːt/", "pos": "n./v.", "zh": "争论，争端，争吵；对……表示异议", "ex_en": "The two countries have been locked in a territorial <em>dispute</em> over the oil-rich islands for decades.", "ex_zh": "两国几十年来一直陷于对这些富含石油的岛屿的领土争端之中。", "scenes": ["国际关系", "法律纠纷", "学术辩论"], "tip": "dispute（正式争论或争端，不一定能解决）vs argument（争论，含个人情绪）vs conflict（冲突，范围更广）。beyond dispute（毋庸置疑）是固定短语。"}, {"word": "strengthen", "phonetic": "/ˈstreŋθn/", "pos": "vt.", "zh": "加强，巩固；增强", "ex_en": "The new trade deal is expected to <em>strengthen</em> economic ties between the two regions.", "ex_zh": "新贸易协议预计将加强两地区之间的经济联系。", "scenes": ["政策效果", "国际关系", "个人发展"], "tip": "strengthen（使更强、更稳固）vs reinforce（加强，强调巩固已有的）vs boost（提升，多用于非正式语境）。"}, {"word": "erosion", "phonetic": "/ɪˈrəʊʒn/", "pos": "n.", "zh": "腐蚀；磨损；（权力/权利的）逐渐削弱", "ex_en": "Coastal <em>erosion</em> has accelerated significantly as a result of rising sea levels and more frequent storms.", "ex_zh": "由于海平面上升和风暴频率增加，海岸侵蚀已大幅加速。", "scenes": ["地理环境", "气候变化", "社会变迁"], "tip": "erosion（物理腐蚀；也指权力、传统等的逐渐削弱）。soil erosion（土壤侵蚀）、the erosion of civil liberties（公民自由的侵蚀）是雅思双义高频词。"}, {"word": "illusion", "phonetic": "/ɪˈluːʒn/", "pos": "n.", "zh": "幻想中的事物；错误观念；错觉，幻觉", "ex_en": "The belief that technology alone can solve environmental problems is largely an <em>illusion</em>.", "ex_zh": "认为单靠技术就能解决环境问题，在很大程度上是一种幻想。", "scenes": ["哲学讨论", "心理科学", "批评分析"], "tip": "illusion（虚假的信念或感觉，不符合现实）vs delusion（妄想，多用于心理学，程度更严重）vs hallucination（幻觉，多指感知上的）。"}, {"word": "industrious", "phonetic": "/ɪnˈdʌstrɪəs/", "pos": "a.", "zh": "勤奋的，勤勉的，勤劳的", "ex_en": "The country's rapid economic growth has been attributed in part to its <em>industrious</em> workforce.", "ex_zh": "该国经济的快速增长，部分归因于其勤劳的劳动力。", "scenes": ["个人品质", "经济发展", "文化比较"], "tip": "industrious（形容人工作努力、勤奋）vs hardworking（勤劳，更口语化）vs diligent（勤勉，强调持之以恒的认真态度）。"}, {"word": "convention", "phonetic": "/kənˈvenʃn/", "pos": "n.", "zh": "大会，会议；惯例，常规，习俗；公约，协定", "ex_en": "The United Nations <em>Convention</em> on the Rights of the Child sets out the rights that all children are entitled to.", "ex_zh": "联合国《儿童权利公约》列明了所有儿童应享有的权利。", "scenes": ["国际法规", "文化习俗", "外交政治"], "tip": "convention（国际公约；或社会惯例）。by convention（按惯例）、a social convention（社会惯例）。注意与 conference（会议）区分。"}, {"word": "organic", "phonetic": "/ɔːˈɡænɪk/", "pos": "a.", "zh": "有机的；有机体的；（变化）渐进自然的", "ex_en": "Demand for <em>organic</em> food has grown steadily as consumers become more health-conscious.", "ex_zh": "随着消费者健康意识增强，对有机食品的需求持续增长。", "scenes": ["食品健康", "农业生产", "生命科学"], "tip": "organic food（有机食品）vs natural food（天然食品，不一定无农药）。organic growth（自然增长，指非收购带来的业务增长）是商业领域高频词。"}, {"word": "concept", "phonetic": "/ˈkɒnsept/", "pos": "n.", "zh": "概念，观念；设想", "ex_en": "The <em>concept</em> of work-life balance has gained increasing attention in recent years.", "ex_zh": "近年来，工作与生活平衡的理念受到越来越多的关注。", "scenes": ["学术写作", "商业战略", "社会讨论"], "tip": "concept（较为抽象、系统化的概念）vs idea（想法，更口语）vs notion（观念，介于两者之间）。the concept of...（……的概念）是学术写作核心句式。"}, {"word": "humble", "phonetic": "/ˈhʌmbl/", "pos": "a.", "zh": "谦逊的，谦虚的；地位低下的；简陋的", "ex_en": "Despite his success, the scientist remained <em>humble</em> and credited his team for all achievements.", "ex_zh": "尽管取得了成功，这位科学家依然保持谦逊，将所有成就归功于他的团队。", "scenes": ["个人品质", "文化价值", "领导力"], "tip": "humble（谦逊，不自吹自擂）vs modest（谦虚，不过分炫耀）。二者近义，但 humble 更强调内心真诚的低姿态。"}, {"word": "invest", "phonetic": "/ɪnˈvest/", "pos": "v.", "zh": "投资；投入（时间、精力等）；授予，赋予", "ex_en": "Governments that <em>invest</em> in early childhood education tend to see long-term economic and social benefits.", "ex_zh": "在幼儿教育方面投入资源的政府，往往能看到长期的经济和社会效益。", "scenes": ["教育政策", "经济发展", "个人成长"], "tip": "invest in（在……上投资/投入）是核心搭配，宾语可以是金钱、时间、精力等。名词 investment 在写作中更常用。"}, {"word": "attain", "phonetic": "/əˈteɪn/", "pos": "vt.", "zh": "达到；获得；完成", "ex_en": "The country has <em>attained</em> a high level of literacy, with over 98% of adults able to read and write.", "ex_zh": "该国已达到较高的识字率，超过98%的成年人具备读写能力。", "scenes": ["教育成就", "政策目标", "个人发展"], "tip": "attain（正式用语，通过努力达到某一高标准）vs achieve（达到，更通用）vs reach（达到，更口语化，强调到达某一水平）。"}, {"word": "ambition", "phonetic": "/æmˈbɪʃn/", "pos": "n.", "zh": "雄心，抱负；野心；（渴望达到的）目标", "ex_en": "Her <em>ambition</em> to become the first female prime minister drove her throughout her political career.", "ex_zh": "成为第一位女性首相的雄心，贯穿了她整个政治生涯。", "scenes": ["个人发展", "政治领导", "职业规划"], "tip": "ambition（可以是正面的抱负，也可以是负面的野心）vs aspiration（渴望，多指正面的理想追求）vs determination（决心，强调意志力）。"}, {"word": "ultimate", "phonetic": "/ˈʌltɪmət/", "pos": "a.", "zh": "最后的，最终的；根本的；最好的，最极端的", "ex_en": "Reducing carbon emissions to net zero is the <em>ultimate</em> goal of global climate agreements.", "ex_zh": "将碳排放减至净零是全球气候协议的最终目标。", "scenes": ["政策目标", "哲学讨论", "产品描述"], "tip": "ultimate（在一系列步骤之后的最终结果；或在某方面达到极致）。the ultimate goal / challenge / test 是雅思写作高频表达。"}, {"word": "regulate", "phonetic": "/ˈreɡjʊleɪt/", "pos": "v.", "zh": "管制，控制；调节，校准；调整", "ex_en": "Governments must <em>regulate</em> the financial sector to prevent excessive risk-taking and protect consumers.", "ex_zh": "政府必须监管金融行业，以防止过度冒险并保护消费者。", "scenes": ["经济政策", "政府监管", "科技治理"], "tip": "regulate（通过规则或法律加以控制）vs control（控制，更广泛）vs manage（管理，强调日常运营）。deregulate（放松管制）是其反义词，也是雅思考点。"}, {"word": "potential", "phonetic": "/pəˈtenʃl/", "pos": "a./n.", "zh": "潜在的；可能的；潜力，潜能", "ex_en": "Artificial intelligence has enormous <em>potential</em> to transform healthcare, education, and industry.", "ex_zh": "人工智能在变革医疗、教育和工业方面具有巨大的潜力。", "scenes": ["科技创新", "个人发展", "风险分析"], "tip": "potential（尚未实现但存在的能力或可能性）。have the potential to do（有做……的潜力）、potential risks（潜在风险）是雅思核心句式。"}, {"word": "thrive", "phonetic": "/θraɪv/", "pos": "vi.", "zh": "兴旺，繁荣；茁壮成长", "ex_en": "Small businesses tend to <em>thrive</em> in environments where regulations are clear and competition is fair.", "ex_zh": "在法规清晰、竞争公平的环境中，小企业往往能蓬勃发展。", "scenes": ["经济发展", "生态系统", "教育成长"], "tip": "thrive（充满活力地繁荣发展，强调状态良好）vs prosper（繁荣，偏经济层面）vs flourish（兴旺，可用于艺术、文化等多种语境）。"}, {"word": "consequently", "phonetic": "/ˈkɒnsɪkwəntlɪ/", "pos": "ad.", "zh": "因此，因而；所以", "ex_en": "The factory was shut down without notice; <em>consequently</em>, hundreds of workers were left without income.", "ex_zh": "工厂未经事先通知就关闭了；因此，数百名工人失去了收入来源。", "scenes": ["因果分析", "学术写作", "报道叙述"], "tip": "consequently（表示直接的因果关系，语气较强）vs therefore（因此，更中性）vs as a result（结果是……，最口语化）。雅思写作中 consequently 最书面正式。"}, {"word": "withstand", "phonetic": "/wɪðˈstænd/", "pos": "vt.", "zh": "抵挡；经受住；顶住", "ex_en": "The new building materials are designed to <em>withstand</em> extreme temperatures and high winds.", "ex_zh": "这些新型建筑材料专为承受极端温度和强风而设计。", "scenes": ["建筑工程", "气候适应", "心理韧性"], "tip": "withstand（承受而不崩溃，强调韧性）vs resist（抵制，强调主动对抗）vs endure（忍受，强调持续承受）。"}, {"word": "privilege", "phonetic": "/ˈprɪvɪlɪdʒ/", "pos": "n.", "zh": "特权，优惠，特许；（令人荣幸的）荣誉", "ex_en": "Access to quality education should be a right for all, not a <em>privilege</em> for the few.", "ex_zh": "获得优质教育应是所有人的权利，而非少数人的特权。", "scenes": ["社会公正", "教育政策", "人权议题"], "tip": "privilege（因阶级、地位或关系而享有的特殊权利）vs right（权利，人人应有的）。privileged（享有特权的）vs underprivileged（弱势的）是雅思高频对比词对。"}, {"word": "infrastructure", "phonetic": "/ˈɪnfrəstrʌktʃə(r)/", "pos": "n.", "zh": "基础结构，基础设施", "ex_en": "Heavy investment in <em>infrastructure</em> — roads, railways, and ports — is critical for economic development.", "ex_zh": "在道路、铁路和港口等基础设施方面的大量投资，对于经济发展至关重要。", "scenes": ["城市建设", "经济政策", "交通规划"], "tip": "infrastructure（支撑社会或组织运作的基本系统和设施）。雅思写作中 invest in infrastructure（投资基础设施）是万能论据句型。"}, {"word": "qualification", "phonetic": "/ˌkwɒlɪfɪˈkeɪʃn/", "pos": "n.", "zh": "资格，合格；技能；限定，条件；合格证", "ex_en": "Many employers now value practical skills over formal <em>qualifications</em> when hiring new staff.", "ex_zh": "如今许多雇主在招聘时，更看重实际技能而非正式资质。", "scenes": ["教育就业", "职业发展", "技能认证"], "tip": "qualification（正式资格证书或认证）vs skill（技能，不一定有证书）vs competence（胜任能力，强调实际表现）。"}, {"word": "expand", "phonetic": "/ɪkˈspænd/", "pos": "v.", "zh": "（使）膨胀，（使）扩张；张开，展开；详述", "ex_en": "The company plans to <em>expand</em> its operations into emerging markets in Southeast Asia.", "ex_zh": "该公司计划将业务扩展到东南亚新兴市场。", "scenes": ["商业发展", "城市增长", "学术讨论"], "tip": "expand（规模或范围上的扩大/增长）vs extend（延伸，强调在已有基础上延长）vs enlarge（增大，多指尺寸或数量）。"}, {"word": "specialist", "phonetic": "/ˈspeʃəlɪst/", "pos": "n.", "zh": "专家；专科医生", "ex_en": "The hospital has recruited several <em>specialists</em> in rare diseases to strengthen its medical team.", "ex_zh": "医院已招募多名罕见病专科医生，以加强其医疗团队。", "scenes": ["医疗健康", "职业发展", "学术研究"], "tip": "specialist（在某一特定领域拥有深入知识的人）vs expert（专家，范围更广）vs professional（专业人士，强调职业化）。"}, {"word": "nutrition", "phonetic": "/njuːˈtrɪʃn/", "pos": "n.", "zh": "营养；营养学；营养物质", "ex_en": "Poor <em>nutrition</em> in early childhood can have lasting effects on cognitive development.", "ex_zh": "幼儿期营养不良可能对认知发展产生持久影响。", "scenes": ["医疗健康", "教育政策", "食品农业"], "tip": "nutrition（营养，泛指食物中维持生命的成分及相关科学）vs diet（饮食，指日常吃什么）vs nourishment（滋养，更文学化）。"}, {"word": "widespread", "phonetic": "/ˈwaɪdspred/", "pos": "a.", "zh": "分布广的；普遍的；广泛存在的", "ex_en": "There is <em>widespread</em> agreement among scientists that human activities are the primary cause of climate change.", "ex_zh": "科学家们普遍认为，人类活动是气候变化的主要原因。", "scenes": ["科学共识", "社会现象", "数据描述"], "tip": "widespread（在地理范围或人群中广泛分布的）vs common（普通的、常见的）vs prevalent（普遍存在的，强调某段时期内的高发性）。"}, {"word": "hazard", "phonetic": "/ˈhæzəd/", "pos": "n.", "zh": "危险，冒险；可能造成危险的事物", "ex_en": "The leaking pipes posed a serious health <em>hazard</em> to residents of the building.", "ex_zh": "漏水管道对楼内居民构成了严重的健康危害。", "scenes": ["安全管理", "环境风险", "职业健康"], "tip": "hazard（潜在的危险因素）vs risk（风险，强调可能性）vs danger（危险，更强调即时威胁）。a fire / health / occupational hazard 是常见搭配。"}, {"word": "conclude", "phonetic": "/kənˈkluːd/", "pos": "v.", "zh": "推断出；作结论；（使）结束，（使）终止", "ex_en": "The panel <em>concluded</em> that the evidence was insufficient to support a definitive recommendation.", "ex_zh": "专家组得出结论，现有证据不足以支持明确的建议。", "scenes": ["学术写作", "法律判断", "研究总结"], "tip": "conclude that...（得出……的结论）是论文写作核心句式。vs deduce（演绎推断，更强调逻辑过程）vs infer（推断，基于间接证据）。"}, {"word": "inherent", "phonetic": "/ɪnˈhɪərənt/", "pos": "a.", "zh": "内在的；生来就有的；固有的", "ex_en": "There are <em>inherent</em> risks in any form of investment, and these must be carefully managed.", "ex_zh": "任何形式的投资都存在固有风险，必须加以谨慎管理。", "scenes": ["风险分析", "哲学讨论", "科学研究"], "tip": "inherent（属于某事物本质的，难以分离）vs innate（天生的，多指人的特质）vs intrinsic（内在的，与 inherent 近义，更正式）。"}, {"word": "ethical", "phonetic": "/ˈeθɪkl/", "pos": "a.", "zh": "（有关）道德的；伦理的；合乎道德的", "ex_en": "Researchers must follow strict <em>ethical</em> guidelines when conducting experiments involving human subjects.", "ex_zh": "研究人员在进行涉及人类受试者的实验时，必须遵守严格的伦理准则。", "scenes": ["科学研究", "商业道德", "社会责任"], "tip": "ethical（符合道德或伦理原则的）vs moral（道德的，更偏个人层面）vs legal（合法的）。raise ethical concerns（引发伦理关切）是雅思高频表达。"}, {"word": "latent", "phonetic": "/ˈleɪtnt/", "pos": "a.", "zh": "潜在的，潜伏的，不易察觉的", "ex_en": "The virus may remain <em>latent</em> in the body for years before any symptoms appear.", "ex_zh": "病毒可能在体内潜伏多年，然后才出现任何症状。", "scenes": ["医疗科学", "心理学", "社会分析"], "tip": "latent（存在但尚未显现的，潜伏的）vs potential（潜在的，强调未来可能性）vs dormant（休眠的，强调暂时不活跃状态）。"}, {"word": "immigrant", "phonetic": "/ˈɪmɪɡrənt/", "pos": "n.", "zh": "（外来）移民；侨民", "ex_en": "Second-generation <em>immigrants</em> often struggle to balance their heritage culture with that of their adopted country.", "ex_zh": "第二代移民常常为在本国文化与祖籍国文化之间寻求平衡而苦苦挣扎。", "scenes": ["社会政策", "文化认同", "人口议题"], "tip": "immigrant（移入某国的外来者）vs emigrant（移出某国的本国人）vs migrant（泛指迁移者，也含经济移民）。"}, {"word": "sequence", "phonetic": "/ˈsiːkwəns/", "pos": "n.", "zh": "一系列，一连串；顺序，次序；序列", "ex_en": "The correct <em>sequence</em> of steps must be followed carefully to avoid errors in the manufacturing process.", "ex_zh": "必须严格按照正确的步骤顺序操作，以避免在制造过程中出现错误。", "scenes": ["科学流程", "逻辑论证", "音乐叙事"], "tip": "sequence（有特定顺序的一系列事物）vs series（一系列，不一定有内在顺序）vs order（顺序，强调排列方式）。in sequence（依次；按顺序）是固定短语。"}, {"word": "ecosystem", "phonetic": "/ˈiːkəʊsɪstəm/", "pos": "n.", "zh": "生态系统", "ex_en": "The destruction of coral reefs threatens the entire marine <em>ecosystem</em> and the species that depend on it.", "ex_zh": "珊瑚礁的破坏威胁着整个海洋生态系统及依赖它的物种。", "scenes": ["环境保护", "生物多样性", "气候变化"], "tip": "ecosystem（特定环境中所有生物与其物理环境构成的整体系统）。雅思环境类文章的核心词，常与 biodiversity、habitat、species 一起出现。"}, {"word": "exotic", "phonetic": "/ɪɡˈzɒtɪk/", "pos": "a.", "zh": "外来的；奇异的；吸引人的，异国情调的", "ex_en": "The introduction of <em>exotic</em> species can disrupt local ecosystems and threaten native wildlife.", "ex_zh": "引入外来物种会破坏当地生态系统，威胁本土野生动植物。", "scenes": ["生态环境", "旅游文化", "生物科学"], "tip": "exotic（来自遥远地方的，往往给人新奇感）vs foreign（外国的，中性）vs alien（外来的，在生态学中专指非本地物种）。"}, {"word": "improvement", "phonetic": "/ɪmˈpruːvmənt/", "pos": "n.", "zh": "改进，进步；改进措施；改进处", "ex_en": "There has been a significant <em>improvement</em> in air quality following the introduction of emission controls.", "ex_zh": "排放管控措施实施后，空气质量有了显著改善。", "scenes": ["政策效果", "学习成长", "技术升级"], "tip": "improvement in（在……方面的改善）是固定搭配。vs progress（进步，强调过程）vs development（发展，范围更广）。"}, {"word": "conviction", "phonetic": "/kənˈvɪkʃn/", "pos": "n.", "zh": "坚定的信念；定罪；说服", "ex_en": "She spoke with great <em>conviction</em>, clearly convinced of the importance of her cause.", "ex_zh": "她说话充满信念，显然对自己事业的重要性坚信不疑。", "scenes": ["个人品质", "法律判决", "演讲表达"], "tip": "conviction（信念，坚信不疑的确信；也指法律上的定罪）。carry conviction（有说服力）vs acquittal（无罪释放，法律反义词）。"}, {"word": "dimension", "phonetic": "/daɪˈmenʃn/", "pos": "n.", "zh": "尺寸，规格；方面，维度；范围", "ex_en": "The social and cultural <em>dimensions</em> of climate change are often overlooked in policy discussions.", "ex_zh": "气候变化的社会和文化层面在政策讨论中往往被忽视。", "scenes": ["学术分析", "政策讨论", "科学研究"], "tip": "dimension（某一方面或维度）。add a new dimension to（为……增添新的维度）、the human dimension（人文层面）是雅思写作常用表达。"}, {"word": "criteria", "phonetic": "/kraɪˈtɪərɪə/", "pos": "n.", "zh": "（评判的）标准，准则（criterion 的复数）", "ex_en": "Applications will be assessed against a set of clearly defined <em>criteria</em>, including experience and qualifications.", "ex_zh": "申请材料将根据一套明确规定的标准进行评估，包括经验和资质。", "scenes": ["学术评审", "政策制定", "职业招聘"], "tip": "criteria 是 criterion 的复数，不可写成 a criteria（错误）。meet / satisfy / fulfil the criteria（符合标准）是固定搭配。"}, {"word": "prior", "phonetic": "/ˈpraɪə(r)/", "pos": "a.", "zh": "先前的，在前的；优先的", "ex_en": "Applicants with <em>prior</em> experience in research will be given preference.", "ex_zh": "有研究经验的申请者将被优先考虑。", "scenes": ["学术申请", "法律文件", "时间顺序"], "tip": "prior to（在……之前）= before，但更书面正式。prior knowledge / experience / approval 是常见搭配。"}, {"word": "adjacent", "phonetic": "/əˈdʒeɪsnt/", "pos": "a.", "zh": "邻近的，毗连的", "ex_en": "The city plans to develop <em>adjacent</em> green spaces into affordable housing to address the shortage.", "ex_zh": "该市计划将毗邻的绿地开发为经济适用房，以解决住房短缺问题。", "scenes": ["城市规划", "地理描述", "建筑设计"], "tip": "adjacent to（紧邻于……）是固定搭配。vs nearby（附近的，不一定相邻）vs neighbouring（邻近的，常用于描述国家/地区）。"}, {"word": "assume", "phonetic": "/əˈsjuːm/", "pos": "vt.", "zh": "假设，假定；承担；（错误地）认为", "ex_en": "It would be dangerous to <em>assume</em> that all students learn in the same way.", "ex_zh": "如果认为所有学生的学习方式都相同，那将是危险的。", "scenes": ["学术论证", "政策讨论", "逻辑分析"], "tip": "assume（未经证明就认为，可能有误）vs suppose（推测，较 assume 更暂时性）vs presume（推定，假定有一定依据）。"}, {"word": "welfare", "phonetic": "/ˈwelfeə(r)/", "pos": "n.", "zh": "福利；福祉；幸福", "ex_en": "The government has pledged to protect the <em>welfare</em> of vulnerable groups, including children and the elderly.", "ex_zh": "政府承诺保护弱势群体（包括儿童和老人）的福祉。", "scenes": ["社会政策", "公共卫生", "动物保护"], "tip": "welfare（人或动物的健康、幸福和繁荣）。social welfare（社会福利）、child welfare（儿童福利）、animal welfare（动物福利）是雅思三大高频搭配。"}, {"word": "statistic", "phonetic": "/stəˈtɪstɪk/", "pos": "n.", "zh": "统计数字；统计学", "ex_en": "The <em>statistics</em> reveal a sharp rise in childhood obesity over the past two decades.", "ex_zh": "统计数据揭示出过去二十年间儿童肥胖率急剧上升。", "scenes": ["数据分析", "学术写作", "社会研究"], "tip": "statistics（统计数字，通常用复数；也指统计学，用单数）。cite / quote statistics（引用统计数据）vs misleading statistics（误导性数据）均是雅思常见表达。"}, {"word": "contradict", "phonetic": "/ˌkɒntrəˈdɪkt/", "pos": "vt.", "zh": "与……矛盾；反驳；否认", "ex_en": "The new findings <em>contradict</em> earlier studies that suggested a link between the two variables.", "ex_zh": "新发现与早期研究相矛盾，后者曾表明两个变量之间存在关联。", "scenes": ["学术论证", "科学研究", "辩论分析"], "tip": "contradict（与某事不一致，互相矛盾）vs refute（反驳，并提供反证）vs dispute（对……提出异议）。"}, {"word": "incentive", "phonetic": "/ɪnˈsentɪv/", "pos": "n.", "zh": "激励，刺激；奖励，诱因", "ex_en": "Tax breaks provide a financial <em>incentive</em> for companies to invest in renewable energy.", "ex_zh": "税收减免为企业投资可再生能源提供了经济激励。", "scenes": ["经济政策", "行为心理", "商业策略"], "tip": "incentive（促使人采取行动的积极因素）vs motivation（动机，更内在）vs reward（奖励，强调给予的结果）。provide / offer incentives（提供激励）是固定搭配。"}, {"word": "explicit", "phonetic": "/ɪkˈsplɪsɪt/", "pos": "a.", "zh": "明确的，清楚的；直接表达的", "ex_en": "The contract should include <em>explicit</em> terms about payment deadlines and penalties for late delivery.", "ex_zh": "合同应包含关于付款截止日期和延迟交付罚款的明确条款。", "scenes": ["法律文件", "学术写作", "政策制定"], "tip": "explicit（明确表达，没有歧义）vs implicit（隐含的，未直接说出）。这对反义词在雅思阅读和写作中均为高频考点。"}, {"word": "revenue", "phonetic": "/ˈrevənjuː/", "pos": "n.", "zh": "收入，收益；税收，财政收入", "ex_en": "Tourism <em>revenue</em> accounts for nearly 20% of the country's total income.", "ex_zh": "旅游收入约占该国总收入的20%。", "scenes": ["经济财政", "商业分析", "政府预算"], "tip": "revenue（收入，尤指政府税收或企业营业额）vs income（收入，偏个人层面）vs profit（利润，扣除成本后的净收益）。"}, {"word": "transition", "phonetic": "/trænˈzɪʃn/", "pos": "n.", "zh": "过渡，转变；转换", "ex_en": "The <em>transition</em> from fossil fuels to renewable energy requires significant investment and policy support.", "ex_zh": "从化石燃料向可再生能源的转型需要大量投资和政策支持。", "scenes": ["能源政策", "社会变迁", "个人成长"], "tip": "transition（从一种状态到另一种状态的过渡过程）。in transition（处于转型期）、a smooth transition（平稳过渡）是雅思高频搭配。"}, {"word": "detect", "phonetic": "/dɪˈtekt/", "pos": "vt.", "zh": "发现，察觉；侦查，探测", "ex_en": "Advanced sensors can now <em>detect</em> air pollutants at extremely low concentrations.", "ex_zh": "先进传感器现在可以在极低浓度下检测到空气污染物。", "scenes": ["科技检测", "医学诊断", "环境监测"], "tip": "detect（通过仪器或感官发现不易察觉的事物）vs discover（发现，强调首次获知）vs identify（识别，强调确定是什么）。"}, {"word": "dominant", "phonetic": "/ˈdɒmɪnənt/", "pos": "a.", "zh": "占主导地位的；支配性的；最有影响力的", "ex_en": "English has become the <em>dominant</em> language of international business and science.", "ex_zh": "英语已成为国际商业和科学领域的主导语言。", "scenes": ["语言文化", "市场竞争", "生态系统"], "tip": "dominant（在某一群体或领域中占据主导或控制地位）vs predominant（占多数的，多指数量或程度上的优势）vs prevailing（普遍存在的，强调当前流行的）。"}, {"word": "arbitrary", "phonetic": "/ˈɑːbɪtrərɪ/", "pos": "a.", "zh": "任意的，武断的；随机的", "ex_en": "Critics argue that the selection process was <em>arbitrary</em> and lacked transparent criteria.", "ex_zh": "批评人士认为，该选拔过程是武断的，缺乏透明标准。", "scenes": ["政策批评", "法律讨论", "逻辑分析"], "tip": "arbitrary（基于个人意愿而非规则或理性，含贬义）vs random（随机的，不含价值判断）vs subjective（主观的，基于个人感受）。"}, {"word": "controversy", "phonetic": "/ˈkɒntrəvɜːsɪ/", "pos": "n.", "zh": "争议，争论，论战", "ex_en": "The construction of the new dam has sparked considerable <em>controversy</em> among environmentalists and local communities.", "ex_zh": "新大坝的修建在环保人士和当地社区中引发了相当大的争议。", "scenes": ["社会议题", "政策讨论", "媒体报道"], "tip": "controversy（公众对某问题存在强烈分歧的持续争论）。controversial（有争议的）是其形容词，stir / spark controversy（引发争议）是固定搭配。"}, {"word": "adequate", "phonetic": "/ˈædɪkwət/", "pos": "a.", "zh": "足够的，充足的；胜任的，适当的", "ex_en": "Many schools in rural areas lack <em>adequate</em> funding to provide quality education for all students.", "ex_zh": "农村地区许多学校缺乏足够的资金，无法为所有学生提供优质教育。", "scenes": ["资源分配", "政策评估", "标准讨论"], "tip": "adequate（刚好够用，满足最低需求）vs sufficient（充足的，含义相近但 sufficient 语气更中性）vs abundant（丰富的，明显超过所需）。"}, {"word": "relevant", "phonetic": "/ˈreləvənt/", "pos": "a.", "zh": "有关的，切题的；有意义的，重要的", "ex_en": "Only submit documents that are directly <em>relevant</em> to the application; irrelevant materials will be discarded.", "ex_zh": "只需提交与申请直接相关的文件；无关材料将被丢弃。", "scenes": ["学术写作", "信息筛选", "政策讨论"], "tip": "relevant to（与……相关）是固定搭配。vs pertinent（恰切的，更正式，与 relevant 近义）vs applicable（适用的，强调可应用性）。"}, {"word": "attribute", "phonetic": "/əˈtrɪbjuːt/", "pos": "vt.", "zh": "把……归因于；认为……是……的结果", "ex_en": "Scientists <em>attribute</em> the recent surge in extreme weather events to accelerating climate change.", "ex_zh": "科学家将近期极端天气事件的激增归因于气候变化加速。", "scenes": ["科学研究", "因果分析", "学术写作"], "tip": "attribute sth to sth（将某事归因于某事）是核心句式。vs ascribe（归因于，较 attribute 更书面）vs blame（归咎于，含负面含义）。"}, {"word": "apparent", "phonetic": "/əˈpærənt/", "pos": "a.", "zh": "表面上的；显然的，明显的", "ex_en": "It became <em>apparent</em> that the initial projections had significantly underestimated the cost.", "ex_zh": "很明显，最初的预测大大低估了成本。", "scenes": ["学术写作", "结果分析", "逻辑论证"], "tip": "apparent（表面上如此，但可能与实际不符；也表明显的）。apparently 在学术写作中常用于转述他人观点。"}, {"word": "concentrate", "phonetic": "/ˈkɒnsntreɪt/", "pos": "v.", "zh": "集中（注意力）；聚集；浓缩", "ex_en": "Students are advised to <em>concentrate</em> on understanding concepts rather than memorising facts.", "ex_zh": "建议学生专注于理解概念，而非死记硬背事实。", "scenes": ["学习方法", "城市规划", "化学工业"], "tip": "concentrate on（专注于……）是核心搭配。vs focus on（更口语）。concentration 也可指浓度，注意语境区分。"}, {"word": "domestic", "phonetic": "/dəˈmestɪk/", "pos": "a.", "zh": "国内的；家庭的；驯养的", "ex_en": "The government has prioritised <em>domestic</em> energy production to reduce reliance on imports.", "ex_zh": "政府优先发展国内能源生产，以减少对进口的依赖。", "scenes": ["经济政策", "家庭生活", "国际比较"], "tip": "domestic policy（国内政策）vs foreign policy（对外政策）；domestic violence（家庭暴力）是雅思社会类高频词组。"}, {"word": "grant", "phonetic": "/ɡrɑːnt/", "pos": "vt./n.", "zh": "授予，给予；批准；补助金，拨款", "ex_en": "The university was <em>granted</em> additional funding to expand its science research facilities.", "ex_zh": "大学获得了额外资金拨款，用于扩建科学研究设施。", "scenes": ["学术资助", "政府审批", "法律权利"], "tip": "grant（正式授予权利、资金或许可）。take sth for granted（认为……理所当然）是重要固定短语。"}, {"word": "expose", "phonetic": "/ɪkˈspəʊz/", "pos": "vt.", "zh": "使暴露；揭露；使接触（新事物）", "ex_en": "Children <em>exposed</em> to multiple languages early in life tend to develop stronger linguistic skills.", "ex_zh": "幼年接触多种语言的儿童往往会发展出更强的语言能力。", "scenes": ["教育成长", "媒体报道", "环境健康"], "tip": "expose sb to sth（使某人接触/暴露于……）是核心搭配。exposure（名词）高频：exposure to pollution / new ideas。"}, {"word": "phenomenon", "phonetic": "/fɪˈnɒmɪnən/", "pos": "n.", "zh": "现象；非凡的人/事", "ex_en": "Social media addiction is a relatively new <em>phenomenon</em> attracting increasing research attention.", "ex_zh": "社交媒体成瘾是一种相对较新的现象，正吸引越来越多的研究关注。", "scenes": ["社会研究", "科学分析", "学术写作"], "tip": "phenomenon 复数为 phenomena（不是 phenomenons）。a widespread / global / rare phenomenon 是常见搭配。"}, {"word": "priority", "phonetic": "/praɪˈɒrətɪ/", "pos": "n.", "zh": "优先，优先权；优先考虑的事", "ex_en": "Improving access to clean water must be a top <em>priority</em> for governments in developing nations.", "ex_zh": "改善清洁水获取渠道必须成为发展中国家政府的首要任务。", "scenes": ["政策规划", "时间管理", "资源分配"], "tip": "give priority to（优先考虑）、top priority（首要任务）是固定搭配。vs preference（个人偏好）。"}, {"word": "parallel", "phonetic": "/ˈpærəlel/", "pos": "a./n.", "zh": "平行的；类似的；（可比较的）相似之处", "ex_en": "There are striking <em>parallels</em> between the economic crises of the 1930s and the present day.", "ex_zh": "1930年代的经济危机与当今之间存在惊人的相似之处。", "scenes": ["历史比较", "学术分析", "数学几何"], "tip": "draw a parallel between A and B（在A和B之间进行类比）是学术写作常用句式。in parallel with（与……同步进行）是固定短语。"}, {"word": "reinforce", "phonetic": "/ˌriːɪnˈfɔːs/", "pos": "vt.", "zh": "加强，强化；增援；巩固", "ex_en": "Positive feedback can <em>reinforce</em> desirable behaviour and encourage continued effort.", "ex_zh": "积极的反馈可以强化良好行为，鼓励持续努力。", "scenes": ["教育心理", "建筑工程", "政策效果"], "tip": "reinforce（加强已有的事物，使其更稳固）vs strengthen（使更有力）。reinforce a stereotype（强化刻板印象）是雅思高频表达。"}, {"word": "substitute", "phonetic": "/ˈsʌbstɪtjuːt/", "pos": "n./v.", "zh": "代替者，代替物；替代，替换", "ex_en": "Many consumers are turning to plant-based foods as a <em>substitute</em> for meat.", "ex_zh": "许多消费者正转向植物性食品作为肉类的替代品。", "scenes": ["食品健康", "能源转型", "教育场景"], "tip": "substitute A for B（用A替代B）。vs replace（完全取代）vs supplement（补充，不完全取代）。"}, {"word": "sustainable", "phonetic": "/səˈsteɪnəbl/", "pos": "a.", "zh": "可持续的；能维持的；环境友好的", "ex_en": "Achieving <em>sustainable</em> economic growth requires balancing development with environmental protection.", "ex_zh": "实现可持续经济增长需要在发展与环境保护之间取得平衡。", "scenes": ["环境政策", "经济发展", "城市规划"], "tip": "sustainable development（可持续发展）是雅思环境类核心词组。vs renewable（可再生的，专指资源）。"}, {"word": "abolish", "phonetic": "/əˈbɒlɪʃ/", "pos": "vt.", "zh": "废除，废止（法律、制度等）", "ex_en": "Many countries have moved to <em>abolish</em> the death penalty, citing human rights concerns.", "ex_zh": "许多国家以人权为由，已着手废除死刑。", "scenes": ["法律制度", "社会改革", "人权议题"], "tip": "abolish（正式废除法律或制度，通常永久性的）vs ban（禁止某行为）vs repeal（废除法律条款）。"}, {"word": "circumstance", "phonetic": "/ˈsɜːkəmstəns/", "pos": "n.", "zh": "情况，环境；[pl.] 境况，经济状况", "ex_en": "The outcome of any decision depends heavily on the <em>circumstances</em> in which it is made.", "ex_zh": "任何决定的结果都在很大程度上取决于作出决定时的环境。", "scenes": ["学术分析", "法律讨论", "日常生活"], "tip": "under / in the circumstances（在这种情况下）是固定表达。circumstances（通常用复数）指围绕某事的整体环境或条件。"}, {"word": "assess", "phonetic": "/əˈses/", "pos": "vt.", "zh": "评估，评价；估算", "ex_en": "Teachers use a variety of tools to <em>assess</em> student progress throughout the academic year.", "ex_zh": "教师在整个学年中使用各种工具来评估学生的学习进度。", "scenes": ["教育评价", "政策研究", "风险管理"], "tip": "assess（系统地评估质量、重要性或程度）vs evaluate（与 assess 近义）vs judge（含主观判断）。名词 assessment 在雅思极高频。"}, {"word": "manipulate", "phonetic": "/məˈnɪpjʊleɪt/", "pos": "vt.", "zh": "操控，操纵；（熟练地）处理；篡改", "ex_en": "The media can <em>manipulate</em> public opinion by selectively reporting certain facts.", "ex_zh": "媒体可以通过有选择性地报道某些事实来操纵公众舆论。", "scenes": ["媒体影响", "科学数据", "人际关系"], "tip": "manipulate（带负面含义，指不正当地控制或影响）vs control（控制，中性）vs influence（影响，中性）。"}, {"word": "demonstrate", "phonetic": "/ˈdemənstreɪt/", "pos": "v.", "zh": "证明，表明；示范；示威游行", "ex_en": "The results clearly <em>demonstrate</em> that regular exercise reduces the risk of cardiovascular disease.", "ex_zh": "结果清楚地表明，规律运动能降低心血管疾病的风险。", "scenes": ["科学研究", "学术写作", "技术教学"], "tip": "demonstrate（通过证据或示范清楚地证明）vs prove（要求更高标准的证明）vs show（最口语化）。"}, {"word": "bias", "phonetic": "/ˈbaɪəs/", "pos": "n.", "zh": "偏见，偏向；偏差", "ex_en": "Researchers must acknowledge any potential <em>bias</em> that may have affected their findings.", "ex_zh": "研究人员必须承认任何可能影响其研究结果的潜在偏差。", "scenes": ["学术研究", "媒体分析", "社会公正"], "tip": "confirmation bias（确认偏误）、media bias（媒体偏向）是雅思阅读高频词组。biased（形容词）= 有偏见的。"}, {"word": "implement", "phonetic": "/ˈɪmplɪment/", "pos": "vt.", "zh": "实施，执行，落实", "ex_en": "It is one thing to design a policy and quite another to <em>implement</em> it effectively.", "ex_zh": "制定政策是一回事，有效地执行则是另一回事。", "scenes": ["政策执行", "项目管理", "技术部署"], "tip": "implement（将计划或政策付诸实践）vs apply（更广泛）vs execute（更侧重行动本身）。名词 implementation（实施）在雅思写作中高频。"}, {"word": "distinguish", "phonetic": "/dɪˈstɪŋɡwɪʃ/", "pos": "v.", "zh": "区别，辨别；使显著，使出众", "ex_en": "It is important to <em>distinguish</em> between correlation and causation when interpreting data.", "ex_zh": "在解读数据时，区分相关性和因果关系非常重要。", "scenes": ["学术分析", "逻辑推理", "科学研究"], "tip": "distinguish between A and B（区分A和B）是核心句式。vs differentiate（强调找出不同点）vs discriminate（区别；也含歧视之义）。"}, {"word": "acknowledge", "phonetic": "/əkˈnɒlɪdʒ/", "pos": "vt.", "zh": "承认；确认；致谢", "ex_en": "The report <em>acknowledges</em> that while progress has been made, significant challenges remain.", "ex_zh": "报告承认，尽管已取得进展，但重大挑战依然存在。", "scenes": ["学术写作", "报告分析", "人际沟通"], "tip": "acknowledge（承认某事存在或属实）vs admit（多用于承认错误）vs recognise（认识到某事的重要性）。"}, {"word": "interaction", "phonetic": "/ˌɪntərˈækʃn/", "pos": "n.", "zh": "相互作用；互动；交流", "ex_en": "Face-to-face <em>interaction</em> is essential for children's social and emotional development.", "ex_zh": "面对面互动对儿童的社会和情感发展至关重要。", "scenes": ["教育心理", "科技影响", "社会研究"], "tip": "human / social interaction（人际互动）是雅思高频搭配。vs communication（沟通，强调信息传递）。"}, {"word": "perspective", "phonetic": "/pəˈspektɪv/", "pos": "n.", "zh": "视角，看问题的角度；正确的认识", "ex_en": "Studying abroad gives students a global <em>perspective</em> that is hard to gain at home.", "ex_zh": "出国留学让学生获得一种在国内难以获得的全球视角。", "scenes": ["教育讨论", "学术写作", "文化比较"], "tip": "from a ... perspective（从……角度来看）是雅思写作最实用的句式之一，可替换 from sb's point of view，但更学术。"}, {"word": "monitor", "phonetic": "/ˈmɒnɪtə(r)/", "pos": "v./n.", "zh": "监控，监测；（电脑）显示器", "ex_en": "Authorities use satellite imagery to <em>monitor</em> deforestation and illegal mining activities.", "ex_zh": "当局使用卫星图像监测森林砍伐和非法采矿活动。", "scenes": ["环境保护", "技术应用", "公共健康"], "tip": "monitor（持续跟踪观察以检测变化）vs supervise（监督，强调人的管理）vs track（追踪，强调记录变化轨迹）。"}, {"word": "contrast", "phonetic": "/ˈkɒntrɑːst/", "pos": "n./v.", "zh": "对比，对照；截然不同", "ex_en": "In <em>contrast</em> to urban areas, rural regions often lack access to quality healthcare services.", "ex_zh": "与城市地区相比，农村地区往往缺乏获得优质医疗服务的途径。", "scenes": ["数据比较", "学术写作", "地区差异"], "tip": "in contrast to / with（与……形成对比）是雅思写作核心转折句式。by contrast（相比之下）置于句首。"}, {"word" ts <em>advocate</em> reducing sugar consumption as a key step in tackling obesity.", "ex_zh": "许多健康专家主张减少糖的摄入，将其作为解决肥胖问题的关键步骤。", "scenes": ["政策倡导", "社会改革", "法律讨论"], "tip": "advocate（积极公开地支持或推动某种观点/政策）vs support（支持，更中性）vs recommend（建议，更个人化）。as an advocate of（作为……的倡导者）在雅思写作中常见。"}];

function getPosClass(pos){
  if(/^adj|^a\./.test(pos))return 'pos-adj';
  if(/^v/.test(pos))return 'pos-v';
  if(/^n/.test(pos))return 'pos-n';
  if(/^ad/.test(pos))return 'pos-adv';
  return 'pos-n';
}
let cur=0,known={},currentUser=null,pendingEmail='';

function show(id){
  ['loading-screen','login-screen','app'].forEach(s=>{
    const el=document.getElementById(s);
    if(el)el.style.display=s===id?'flex':'none';
  });
  if(id==='app')document.getElementById('app').style.flexDirection='column';
}

async function sendOTP(){
  const email=document.getElementById('email-input').value.trim();
  const err=document.getElementById('send-err');
  const btn=document.getElementById('send-btn');
  if(!email){err.textContent='请输入邮箱';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='发送中...';err.style.display='none';
  try{
  const {error}=await Promise.race([
    sb.auth.signInWithOtp({email}),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('网络超时，请重试')),8000))
  ]);
  if(error){
    btn.disabled=false;btn.textContent='发送验证码';
    console.error('sendOTP error:',error,{msg:error.message,code:error.code,status:error.status,name:error.name});
    err.textContent='发送失败：'+(error.message||error.code||(error.status?'HTTP '+error.status:'')||String(error)||'请稍后重试');err.style.display='block';
  } else {
    pendingEmail=email;
    document.getElementById('email-display').textContent=email;
    document.getElementById('step-email').style.display='none';
    document.getElementById('step-otp').style.display='block';
    setTimeout(()=>document.getElementById('otp-input').focus(),100);
  }
  }catch(e){
    btn.disabled=false;btn.textContent='发送验证码';
    err.textContent=e.message||'网络超时，请重试';err.style.display='block';
  }
}

async function verifyOTP(){
  const token=document.getElementById('otp-input').value.trim();
  const err=document.getElementById('verify-err');
  const btn=document.getElementById('verify-btn');
  if(token.length!==6){err.textContent='请输入6位验证码';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='验证中...';err.style.display='none';
  try{
    const {data,error}=await Promise.race([
      sb.auth.verifyOtp({email:pendingEmail,token,type:'email'}),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('网络超时，请重试')),8000))
    ]);
    if(error){
      btn.disabled=false;btn.textContent='登录';
      err.textContent='失败：'+error.message;err.style.display='block';
      document.getElementById('otp-input').value='';
      document.getElementById('otp-input').focus();
    } else if(data?.user){
      await onLogin(data.user);
    } else {
      btn.disabled=false;btn.textContent='登录';
      err.textContent='未收到用户信息，请重试';err.style.display='block';
    }
  }catch(e){
    btn.disabled=false;btn.textContent='登录';
    err.textContent=e.message||'网络超时，请重试';err.style.display='block';
  }
}

function backToEmail(){
  document.getElementById('step-otp').style.display='none';
  document.getElementById('step-email').style.display='block';
  document.getElementById('send-btn').disabled=false;
  document.getElementById('send-btn').textContent='发送验证码';
  document.getElementById('otp-input').value='';
  document.getElementById('verify-err').style.display='none';
}

async function logout(){
  await sb.auth.signOut();
  cur=0;known={};currentUser=null;
  backToEmail();show('login-screen');
}

function setSyncDot(state){
  const d=document.getElementById('sync-dot');
  d.className='sync-dot on'+(state==='syncing'?' syncing':'');
  if(state==='done')setTimeout(()=>{d.className='sync-dot';},2000);
}

async function loadProgress(){
  try{
    const {data,error}=await sb.from('vocab_progress').select('word_key,known');
    if(error)throw error;
    known={};data.forEach(r=>{known[r.word_key]=r.known;});
  }catch(e){try{known=JSON.parse(localStorage.getItem('known_v1')||'{}');}catch(e2){}}
  try{cur=Math.min(parseInt(localStorage.getItem('cur_v1')||'0')||0,words.length-1);}catch(e){cur=0;}
}

async function saveKnown(wordKey,isKnown){
  known[wordKey]=isKnown;
  try{localStorage.setItem('known_v1',JSON.stringify(known));}catch(e){}
  if(!currentUser)return;
  setSyncDot('syncing');
  try{
    const {error}=await sb.from('vocab_progress').upsert(
      {user_id:currentUser.id,word_key:wordKey,known:isKnown,updated_at:new Date().toISOString()},
      {onConflict:'user_id,word_key'}
    );
    setSyncDot(error?'err':'done');
  }catch(e){setSyncDot('err');}
}

async function onLogin(user){
  currentUser=user;
  document.getElementById('user-email').textContent=user.email;
  await loadProgress();
  show('app');
  const start=new Date('2025-01-01');
  document.getElementById('day-tag').textContent='Day '+(Math.floor((new Date()-start)/864e5)%365+1);
  render();
}

function render(){
  if(cur>=words.length){showDone();return;}
  const w=words[cur],k=known[w.word];
  document.getElementById('pbar').style.width=((cur+1)/words.length*100)+'%';
  document.getElementById('cur-num').textContent=cur+1;
  document.getElementById('total-num').textContent=words.length;
  document.getElementById('btn-prev').disabled=cur===0;
  document.getElementById('btn-next').disabled=cur===words.length-1;
  try{localStorage.setItem('cur_v1',cur);}catch(e){}
  const markHtml=k===true?'<span class="known-mark yes"><i class="ti ti-check"></i> 认识</span>':k===false?'<span class="known-mark no"><i class="ti ti-x"></i> 不认识</span>':'';
  document.getElementById('vocab-card').innerHTML=`
    <div class="word-row"><span class="word">${w.word}</span><span class="pos-badge ${getPosClass(w.pos)}">${w.pos}</span>${markHtml}</div>
    <div class="phonetic">${w.phonetic}</div>
    <div class="zh-meaning">${w.zh}</div>
    <div class="section"><div class="section-label"><i class="ti ti-pencil"></i>例句</div><div class="example-en">${w.ex_en}</div><div class="example-zh">${w.ex_zh}</div></div>
    <div class="divider"></div>
    <div class="section"><div class="section-label"><i class="ti ti-map-pin"></i>常见场景</div><div class="tags">${w.scenes.map(s=>`<span class="tag"><i class="ti ti-tag"></i>${s}</span>`).join('')}</div></div>
    <div class="section" style="margin-bottom:0"><div class="section-label"><i class="ti ti-alert-triangle"></i>易混易错</div><div class="tip-box"><i class="ti ti-alert-triangle"></i><span>${w.tip}</span></div></div>`;
  document.getElementById('card-area').style.display='block';
  document.getElementById('done-screen').style.display='none';
  document.getElementById('main-nav').style.display='flex';
  document.getElementById('swipe-hint').style.display=window.innerWidth<600?'flex':'none';
}

function showDone(){
  const kn=Object.values(known).filter(v=>v===true).length;
  const un=Object.values(known).filter(v=>v===false).length;
  document.getElementById('stat-known').textContent=kn;
  document.getElementById('stat-unknown').textContent=un;
  document.getElementById('done-desc').textContent=`认识 ${kn} 个，待复习 ${un} 个。明天继续加油！`;
  document.getElementById('card-area').style.display='none';
  document.getElementById('done-screen').style.display='flex';
  document.getElementById('main-nav').style.display='none';
}

function navigate(d){cur=Math.max(0,Math.min(words.length-1,cur+d));render();}

function markKnown(val){
  saveKnown(words[cur].word,val);render();
  if(cur<words.length-1)setTimeout(()=>navigate(1),280);
  else setTimeout(showDone,280);
}

function restart(){
  cur=0;
  document.getElementById('card-area').style.display='block';
  document.getElementById('done-screen').style.display='none';
  document.getElementById('main-nav').style.display='flex';
  render();
}

function showArchive(){
  // 按状态分组
  const knownWords=[], unknownWords=[], unmarkedWords=[];
  words.forEach(w=>{
    const s=known[w.word];
    if(s===true)knownWords.push(w);
    else if(s===false)unknownWords.push(w);
    else unmarkedWords.push(w);
  });
  function renderList(listId, arr){
    const el=document.getElementById(listId);
    el.innerHTML=arr.length===0?'<div style="font-size:13px;color:var(--text3);padding:8px 12px">暂无</div>':
      arr.map((w,i)=>`<div class="archive-item" onclick="jumpToWord('${w.word}')">
        <span class="archive-item-word">${w.word}</span>
        <span class="archive-item-ph">${w.phonetic}</span>
        <span class="archive-item-zh">${w.zh.split('；')[0]}</span>
      </div>`).join('');
  }
  renderList('known-list', knownWords);
  renderList('unknown-list', unknownWords);
  renderList('unmarked-list', unmarkedWords);
  document.getElementById('known-count').textContent=knownWords.length;
  document.getElementById('unknown-count').textContent=unknownWords.length;
  document.getElementById('unmarked-count').textContent=unmarkedWords.length;
  // 隐藏主内容，显示归档
  document.getElementById('card-area').style.display='none';
  document.getElementById('done-screen').style.display='none';
  document.getElementById('main-nav').style.display='none';
  document.getElementById('archive-screen').style.display='block';
}

function hideArchive(){
  document.getElementById('archive-screen').style.display='none';
  render();
}

function jumpToWord(word){
  const idx=words.findIndex(w=>w.word===word);
  if(idx>=0){cur=idx;hideArchive();}
}

(function(){
  let sx=0,sy=0;
  document.getElementById('app').addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  document.getElementById('app').addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.5){if(dx<0&&cur<words.length-1)navigate(1);else if(dx>0&&cur>0)navigate(-1);}
  },{passive:true});
})();

document.getElementById('email-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendOTP();});
document.getElementById('otp-input').addEventListener('keydown',e=>{if(e.key==='Enter')verifyOTP();});
document.getElementById('otp-input').addEventListener('input',e=>{
  e.target.value=e.target.value.replace(/\D/g,'');
  if(e.target.value.length===6)verifyOTP();
});

sb.auth.onAuthStateChange(async(event,session)=>{
  if((event==='SIGNED_IN'||event==='INITIAL_SESSION')&&session?.user)await onLogin(session.user);
  else if(event==='SIGNED_OUT')show('login-screen');
});

(async()=>{
  show('loading-screen');
  try{
    const res=await Promise.race([
      sb.auth.getSession(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),5000))
    ]);
    const {data:{session}}=res;
    if(session?.user)await onLogin(session.user);
    else show('login-screen');
  }catch(e){show('login-screen');}
})();
</script>
</body>
